<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simply Three</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪙</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1e293b; 
            color: #f1f5f9;
        }
        .card {
            background-color: #334155; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            border-radius: 1rem;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 280px; 
        }
        .card:hover {
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }
        
        .border-t-accent { border-top-width: 6px; border-top-style: solid; }
        .card-indigo { border-top-color: #6366f1; }
        .card-teal { border-top-color: #14b8a6; }
        .card-rose { border-top-color: #f43f5e; }
        .card-emerald { border-top-color: #10b981; }
        .card-purple { border-top-color: #a855f7; }
        .card-amber { border-top-color: #f59e0b; }

        input[type="text"] {
            background-color: #1e293b;
            color: #f8fafc;
            font-size: 1.5rem;
            text-align: center;
            border: 2px solid #475569;
            padding: 0.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        input[type="text"]:focus {
            border-color: #818cf8;
            outline: none;
            background-color: #0f172a;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
        }
        input::placeholder {
            color: #475569;
        }
        input[readonly] {
            background-color: #0f172a;
            cursor: not-allowed;
            border-color: #334155;
            color: #64748b;
        }
        h2[contenteditable="true"]:focus {
            background-color: rgba(255, 255, 255, 0.05);
            outline: none;
        }
        hr.divider {
            border: 0;
            height: 2px;
            background: #475569;
            margin: 4px 0;
        }
    </style>
</head>
<body class="p-4 sm:p-6 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-[1440px]">
        <header class="mb-8 text-center">
            <h1 onclick="clearAllCalculators()" class="text-4xl font-extrabold text-white tracking-tight cursor-pointer select-none">Simply Three</h1>
        </header>

        <div id="main-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Calcs 1-6 -->
            <script>
                const colors = ['indigo', 'teal', 'rose', 'emerald', 'purple', 'amber'];
                for (let i = 1; i <= 6; i++) {
                    const color = colors[i-1];
                    document.write(`
                        <div id="calc${i}" class="card card-${color} border-t-accent p-6 flex flex-col justify-between">
                            <h2 contenteditable="true" class="text-xl font-bold text-${color}-300 mb-2 px-2 py-1 rounded-md"></h2>
                            <div class="space-y-4">
                                <div class="flex items-center justify-center space-x-6 text-3xl font-bold">
                                    <div class="flex flex-col items-center">
                                        <input type="text" id="A${i}" placeholder="A" class="w-24 auto-select" data-calc="${i}">
                                        <hr class="divider w-24">
                                        <input type="text" id="B${i}" placeholder="B" class="w-24 auto-select" data-calc="${i}">
                                    </div>
                                    <span class="text-slate-500">=</span>
                                    <div class="flex flex-col items-center">
                                        <input type="text" id="C${i}" value="1" class="w-24 auto-select" data-calc="${i}">
                                        <hr class="divider w-24">
                                        <input type="text" id="D${i}" value="x" readonly class="w-24">
                                    </div>
                                </div>
                                <button onclick="solveCrossMultiplication('${i}')"
                                    class="w-full bg-${color}-500 hover:bg-${color}-600 text-white font-bold py-2.5 rounded-xl transition shadow-lg">
                                    Solve
                                </button>
                                <div id="result${i}" class="text-center min-h-[40px]"></div>
                            </div>
                        </div>
                    `);
                }
            </script>
        </div>

        <div id="modal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-80 flex items-center justify-center z-50">
            <div class="bg-slate-800 border border-slate-700 rounded-lg p-6 max-w-sm w-full shadow-2xl">
                <h3 id="modalTitle" class="text-xl font-bold mb-4">Error</h3>
                <p id="modalMessage" class="text-slate-300 mb-6"></p>
                <button onclick="closeModal()" class="w-full bg-slate-600 hover:bg-slate-500 text-white font-semibold py-2 rounded-lg transition">
                    Got it
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setupEnterKeyListeners();
            setupKeyboardListeners();
            setupAutoSelect();
            setupArrowKeyNavigation();
            setupAutoSolveOnBlur();
            
            // Focus on the first 'A' input field automatically
            const firstA = document.getElementById('A1');
            if (firstA) {
                firstA.focus();
            }
        });

        function clearAllCalculators() {
            for (let i = 1; i <= 6; i++) {
                document.getElementById('A' + i).value = '';
                document.getElementById('B' + i).value = '';
                document.getElementById('C' + i).value = '1';
                document.getElementById('result' + i).innerHTML = '';
            }
        }

        function setupArrowKeyNavigation() {
            window.addEventListener('keydown', (e) => {
                const active = document.activeElement;
                if (!active || active.tagName !== 'INPUT' || !active.id) return;

                const type = active.id.charAt(0);
                const num = parseInt(active.id.substring(1));
                let nextId = "";

                if (e.key === 'ArrowRight') {
                    if (type === 'A') nextId = 'B' + num;
                    else if (type === 'B') nextId = 'C' + num;
                    else if (type === 'C') nextId = 'A' + ((num % 6) + 1);
                } else if (e.key === 'ArrowLeft') {
                    if (type === 'C') nextId = 'B' + num;
                    else if (type === 'B') nextId = 'A' + num;
                    else if (type === 'A') {
                        let prevNum = num - 1;
                        if (prevNum < 1) prevNum = 6;
                        nextId = 'C' + prevNum;
                    }
                }

                if (nextId) {
                    const nextEl = document.getElementById(nextId);
                    if (nextEl) { 
                        e.preventDefault(); 
                        nextEl.focus(); 
                    }
                }
            });
        }

        function setupAutoSelect() {
            document.querySelectorAll('.auto-select').forEach(input => {
                input.addEventListener('focus', function() { setTimeout(() => this.select(), 0); });
                input.addEventListener('click', function() { this.select(); });
            });
        }

        function setupAutoSolveOnBlur() {
            document.querySelectorAll('input.auto-select').forEach(input => {
                input.addEventListener('blur', (e) => {
                    const currentCalcId = input.getAttribute('data-calc');
                    const relatedTarget = e.relatedTarget;
                    
                    // If moving focus to an element that isn't an input or belongs to a different calculator
                    if (!relatedTarget || relatedTarget.getAttribute('data-calc') !== currentCalcId) {
                        solveCrossMultiplication(currentCalcId, true); // true = silent solve (no modals)
                    }
                });
            });
        }

        function updateAllCFields(val) {
            for (let i = 1; i <= 6; i++) {
                const field = document.getElementById('C' + i);
                if (field) field.value = val;
            }
        }

        function setupKeyboardListeners() {
            window.addEventListener('keydown', (event) => {
                // Shift + Space: Jump to next calculator A field
                if (event.shiftKey && event.code === 'Space') {
                    event.preventDefault();
                    const active = document.activeElement;
                    let currentId = 0;
                    if (active && active.id) {
                        const match = active.id.match(/\d+/);
                        if (match) currentId = parseInt(match[0]);
                    }
                    const nextId = (currentId % 6) + 1;
                    const nextField = document.getElementById('A' + nextId);
                    if (nextField) {
                        nextField.focus();
                        nextField.select();
                    }
                    return;
                }

                // Shift + 1, 2, 3 logic using both key and code for reliability
                if (event.shiftKey) {
                    let newValue = null;
                    
                    if (event.key === '1' || event.code === 'Digit1' || event.code === 'Numpad1' || event.key === '!') {
                        newValue = "1";
                    } else if (event.key === '2' || event.code === 'Digit2' || event.code === 'Numpad2' || event.key === '@') {
                        newValue = "10";
                    } else if (event.key === '3' || event.code === 'Digit3' || event.code === 'Numpad3' || event.key === '#') {
                        newValue = "100";
                    }

                    if (newValue !== null) {
                        event.preventDefault();
                        updateAllCFields(newValue);
                    }
                }
            }, true); // Use capture phase
        }

        function setupEnterKeyListeners() {
            for (let i = 1; i <= 6; i++) {
                ['A', 'B', 'C'].forEach(p => {
                    document.getElementById(p + i).addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            solveCrossMultiplication(i.toString());
                            e.target.blur();
                        }
                    });
                });
            }
        }

        function showModal(title, message, isError = true) {
            const m = document.getElementById('modal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('modalTitle').className = `text-xl font-bold mb-4 ${isError ? 'text-rose-400' : 'text-emerald-400'}`;
            m.classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function solveCrossMultiplication(id, silent = false) {
            const res = document.getElementById('result' + id);
            const aRaw = document.getElementById('A' + id).value;
            const bRaw = document.getElementById('B' + id).value;
            const cRaw = document.getElementById('C' + id).value;
            
            // For silent auto-solve, if any field is empty, don't show error modals
            if (silent && (!aRaw || !bRaw || !cRaw)) return;

            const a = parseFloat(aRaw);
            const b = parseFloat(bRaw);
            const c = parseFloat(cRaw);

            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                if (!silent) showModal('Input Error', 'Please enter valid numbers.');
                return;
            }
            if (a === 0) {
                if (!silent) showModal('Math Error', 'Value A cannot be zero.');
                return;
            }

            const sol = (b * c) / a;
            const text = sol.toLocaleString(undefined, { maximumFractionDigits: 4 });
            const colorMap = ['indigo', 'teal', 'rose', 'emerald', 'purple', 'amber'];
            const color = colorMap[parseInt(id)-1];
            res.innerHTML = `<p class="text-3xl font-extrabold text-${color}-400">x = ${text}</p>`;
        }
    </script>
</body>
</html>
