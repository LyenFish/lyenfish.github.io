<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>308 Conversational Questions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #3e6db8;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            scroll-behavior: smooth;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .question-card {
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background-color: var(--card-bg);
        }
        .grid-btn {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: 0.5rem;
            transition: all 0.2s ease;
            background-color: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
            cursor: pointer;
            scroll-margin-top: 350px;
        }
        .grid-btn:hover {
            border-color: var(--primary);
            color: var(--text-main);
        }
        .grid-btn.visited {
            background-color: #2e4a85;
            color: #cbd5e1;
            border-color: #3e6db8;
        }
        .grid-btn.active {
            background-color: var(--primary) !important;
            color: white !important;
            transform: scale(1.15);
            z-index: 10;
            box-shadow: 0 0 20px rgba(62, 109, 184, 0.6);
            border-color: #fff !important;
        }
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #334155;
        }
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: opacity 0.5s ease;
        }
        .login-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }
        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

ful view you’ve ever seen?", "How did you and your best friend meet?", "What are you looking forward to?", "What activity makes you lose track of time?", "What is the most useless talent you possess?", "What restaurant would you open and what's the name?", "Were you excited to be a grownup when you were a kid?", "If you started a band, what would be the genre and name?", "When was the last time you tried something new?", "What wouldn't you wish on your worst enemy?", "When do you feel like the best version of yourself?", "What keeps you up at night?", "What media has changed the way you thought about the world?", "Where would you haunt as a ghost?", "What are the stories behind your scars or tattoos?", "What is something you are confident you will never do?", "What’s your million dollar business idea?", "What feature would a caricature artist exaggerate?", "What is something you and I disagree on?"];
        const totalQuestions = questions.length;
        const gridContainer = document.getElementById('grid-container');
        const qText = document.getElementById('question-text');
        const qNum = document.getElementById('question-number');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const usernameInput = document.getElementById('username-input');
        
        let currentActiveId = null;
        let currentUser = "Mega boss";
        let visitedQuestions = new Set();

        async function handleLogin() {
            const val = usernameInput.value.trim();
            if (val) currentUser = val;

            const btn = document.getElementById('login-btn');
            btn.innerHTML = '<div class="loading-spinner"></div><span>Syncing...</span>';
            btn.disabled = true;

            await loadUserProgress();

            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = 'none';
                qText.innerHTML = `Welcome back, <span class="text-blue-300 font-bold">${currentUser}</span>. Ready for more?`;
            }, 500);
        }

        async function loadUserProgress() {
            if (!API_URL) return;
            try {
                const response = await fetch(`${API_URL}?username=${encodeURIComponent(currentUser)}`);
                const data = await response.json();
                visitedQuestions = new Set(data.map(id => parseInt(id)));
                renderVisitedState();
                updateProgress();
            } catch (err) {
                console.error("Failed to load progress:", err);
            }
        }

        async function syncToSheet(questionId, status) {
            if (!API_URL) return;
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: currentUser,
                        questionId: questionId,
                        status: status
                    })
                });
            } catch (err) {
                console.error("Failed to sync:", err);
            }
        }

        function renderVisitedState() {
            for (let i = 1; i <= totalQuestions; i++) {
                const btn = document.getElementById(`btn-${i}`);
                if (visitedQuestions.has(i)) {
                    btn.classList.add('visited');
                } else {
                    btn.classList.remove('visited');
                }
            }
        }

        function createGrid() {
            for (let i = 1; i <= totalQuestions; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.id = `btn-${i}`;
                btn.className = 'grid-btn';
                btn.onclick = () => displayQuestion(i, false);
                gridContainer.appendChild(btn);
            }
        }

        function updateProgress() {
            const count = visitedQuestions.size;
            progressText.innerText = `${count} / ${totalQuestions} Answered`;
            const percent = (count / totalQuestions) * 100;
            progressBar.style.width = `${percent}%`;
        }

        function displayQuestion(id, shouldScroll) {
            const btn = document.getElementById(`btn-${id}`);
            
            if (currentActiveId === id && btn.classList.contains('visited')) {
                btn.classList.remove('visited', 'active');
                visitedQuestions.delete(id);
                syncToSheet(id, 'removed');
                currentActiveId = null;
                qNum.innerText = "Select a Question";
                qText.innerHTML = `Question removed from your visited list, ${currentUser}.`;
                updateProgress();
                return;
            }

            const questionStr = questions[id - 1];
            qNum.innerText = `Question #${id}`;
            qText.innerText = questionStr;

            if (currentActiveId) {
                const oldBtn = document.getElementById(`btn-${currentActiveId}`);
                if (oldBtn) oldBtn.classList.remove('active');
            }

            if (btn) {
                btn.classList.add('active');
                if (!visitedQuestions.has(id)) {
                    btn.classList.add('visited');
                    visitedQuestions.add(id);
                    syncToSheet(id, 'visited');
                }
                currentActiveId = id;
                updateProgress();
                if (shouldScroll) btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function pickRandom() {
            const randomIndex = Math.floor(Math.random() * totalQuestions) + 1;
            displayQuestion(randomIndex, true);
        }

        usernameInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleLogin(); });
        window.onload = createGrid;
    </script>
</body>
</html>
