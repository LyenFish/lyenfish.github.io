<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Valley Community Center Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #fdf6e3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .stardew-card {
            background: #fffdfa;
            border: 4px solid #8b5a2b;
            box-shadow: 4px 4px 0px #5d3a1a;
            border-radius: 8px;
        }
        .season-spring { border-top: 8px solid #4ade80; }
        .season-summer { border-top: 8px solid #fbbf24; }
        .season-fall { border-top: 8px solid #f97316; }
        .season-winter { border-top: 8px solid #60a5fa; }
        .season-any { border-top: 8px solid #a855f7; }

        input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
            accent-color: #8b5a2b;
        }

        .completed-text {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .progress-bar {
            transition: width 0.5s ease-in-out;
        }

        .gold-star {
            color: #d97706;
            font-weight: bold;
            text-shadow: 0.5px 0.5px 0px #000;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-amber-900 mb-2">Community Center Checklist</h1>
            <p class="text-amber-700">Track your progress, Mega boss! Keep an eye on those Gold Star requirements.</p>
            
            <!-- Progress Tracker -->
            <div class="mt-6 bg-amber-200 rounded-full h-6 w-full max-w-md mx-auto border-2 border-amber-900 overflow-hidden">
                <div id="master-progress" class="progress-bar bg-green-500 h-full w-0 flex items-center justify-center text-xs font-bold text-white">0%</div>
            </div>
            <p class="text-sm mt-2 text-amber-800 font-bold" id="stats-text">0 / 0 items completed</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <!-- SPRING -->
            <section class="stardew-card season-spring p-4">
                <h2 class="text-xl font-bold text-green-700 mb-4 flex items-center gap-2">
                    🌱 Spring
                </h2>
                <div class="space-y-2 checklist-group" data-season="spring"></div>
            </section>

            <!-- SUMMER -->
            <section class="stardew-card season-summer p-4">
                <h2 class="text-xl font-bold text-amber-600 mb-4 flex items-center gap-2">
                    ☀️ Summer
                </h2>
                <div class="space-y-2 checklist-group" data-season="summer"></div>
            </section>

            <!-- FALL -->
            <section class="stardew-card season-fall p-4">
                <h2 class="text-xl font-bold text-orange-600 mb-4 flex items-center gap-2">
                    🍂 Fall
                </h2>
                <div class="space-y-2 checklist-group" data-season="fall"></div>
            </section>

            <!-- WINTER -->
            <section class="stardew-card season-winter p-4">
                <h2 class="text-xl font-bold text-blue-500 mb-4 flex items-center gap-2">
                    ❄️ Winter
                </h2>
                <div class="space-y-2 checklist-group" data-season="winter"></div>
            </section>

            <!-- ANY SEASON / YEAR ROUND -->
            <section class="stardew-card season-any p-4 lg:col-span-2">
                <h2 class="text-xl font-bold text-purple-600 mb-4 flex items-center gap-2">
                    🌍 Year Round / Mines / Animals
                </h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-4 checklist-group" data-season="any"></div>
            </section>

        </div>

        <footer class="mt-12 text-center text-amber-800 text-sm italic">
            <p>Note: Gold Star requirements apply to the Quality Crops Bundle (pick 3 out of 4).</p>
            <button onclick="resetAll()" class="mt-4 px-4 py-2 bg-red-700 text-white rounded hover:bg-red-800 transition-colors">Reset All Progress</button>
        </footer>
    </div>

    <script>
        const items = {
            spring: [
                "Parsnip", "Green Bean", "Cauliflower", "Potato", 
                "Wild Horseradish", "Daffodil", "Leek", "Dandelion",
                "Sunfish (Sunny)", "Catfish (Rainy)", "Shad (Rainy)", 
                "Largemouth Bass", "Carp", "Bullhead", "Sturgeon", 
                "Sardine", "Morel (Secret Woods)",
                "<span class='gold-star'>★ 5x Parsnip (Gold Quality)</span>"
            ],
            summer: [
                "Tomato", "Hot Pepper", "Blueberry", "Melon", "Poppy", "Sunflower",
                "Grape", "Spice Berry", "Sweet Pea",
                "Red Snapper (Rainy)", "Tuna", "Tilapia",
                "Bream (Night)", "Eel (Rainy/Night)", "Pufferfish (Sunny)",
                "Fiddlehead Fern (Secret Woods)",
                "<span class='gold-star'>★ 5x Melon (Gold Quality)</span>"
            ],
            fall: [
                "Corn", "Eggplant", "Pumpkin", "Yam",
                "Common Mushroom", "Wild Plum", "Hazelnut", "Blackberry",
                "Tiger Trout", "Walleye (Rainy/Night)",
                "Red Cabbage (Year 2 or Cart)",
                "<span class='gold-star'>★ 5x Pumpkin (Gold Quality)</span>",
                "<span class='gold-star'>★ 5x Corn (Gold Quality)</span>"
            ],
            winter: [
                "Winter Root", "Crystal Fruit", "Snow Yam", "Crocus",
                "Nautilus Shell (Beach Foraging)"
            ],
            any: [
                "Wood (99 x2)", "Stone (99)", "Hardwood (10)",
                "Copper Bar", "Iron Bar", "Gold Bar",
                "Quartz", "Earth Crystal", "Frozen Tear", "Fire Quartz",
                "Slime (99)", "Bat Wing (10)", "Solar Essence", "Void Essence",
                "Large Milk", "Large Goat Milk", "Large Brown Egg", "Large White Egg", "Duck Egg", "Wool", "Duck Feather", "Rabbit's Foot",
                "Truffle / Truffle Oil", "Cloth", "Goat Cheese", "Cheese", "Honey", "Jelly", "Wine",
                "Maki Roll", "Fried Egg",
                "Apple (x3 for Fodder Bundle)", "Apricot", "Orange", "Peach", "Pomegranate", "Cherry",
                "Wheat (x10)", "Hay (x10)",
                "Ghostfish (Mines)", "Sandfish (Desert)", "Woodskip (Secret Woods)",
                "Crab Pot: Lobster, Clam, Crayfish, etc. (Need 5 types)",
                "Vault: 2,500g", "Vault: 5,000g", "Vault: 10,000g", "Vault: 25,000g"
            ]
        };

        function init() {
            for (const [season, list] of Object.entries(items)) {
                const container = document.querySelector(`[data-season="${season}"]`);
                list.forEach(itemName => {
                    // Create a clean ID for localStorage, stripping HTML tags
                    const cleanName = itemName.replace(/<[^>]*>/g, '');
                    const id = cleanName.replace(/\s+/g, '-').toLowerCase();
                    
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-3 p-1 hover:bg-amber-50 rounded transition-colors";
                    
                    const checked = localStorage.getItem(id) === 'true';
                    
                    div.innerHTML = `
                        <input type="checkbox" id="${id}" ${checked ? 'checked' : ''} onchange="toggleItem('${id}')">
                        <label for="${id}" class="text-amber-900 cursor-pointer select-none ${checked ? 'completed-text' : ''}">${itemName}</label>
                    `;
                    container.appendChild(div);
                });
            }
            updateProgress();
        }

        function toggleItem(id) {
            const cb = document.getElementById(id);
            const label = cb.nextElementSibling;
            localStorage.setItem(id, cb.checked);
            
            if (cb.checked) {
                label.classList.add('completed-text');
            } else {
                label.classList.remove('completed-text');
            }
            updateProgress();
        }

        function updateProgress() {
            const allCheckboxes = document.querySelectorAll('input[type="checkbox"]');
            const checked = document.querySelectorAll('input[type="checkbox"]:checked');
            const percent = Math.round((checked.length / allCheckboxes.length) * 100);
            
            const bar = document.getElementById('master-progress');
            bar.style.width = percent + '%';
            bar.innerText = percent + '%';
            
            document.getElementById('stats-text').innerText = `${checked.length} / ${allCheckboxes.length} items completed`;
        }

        function resetAll() {
            if (confirm("Mega boss, are you sure you want to reset all progress? This cannot be undone.")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
