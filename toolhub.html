        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'question-app-mega';

        let userState = { username: '', seenIndices: [] };
        let lastIndex = -1;
        let authReady = false;
        let isLocalMode = false;

        async function initAuth() {
            try {
                // If we are on file:// protocol, Firebase Auth often blocks requests.
                if (window.location.protocol === 'file:') {
                    throw new Error("Local file protocol detected.");
                }

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                authReady = true;
                document.getElementById('auth-status').innerText = "Connected to Cloud";
            } catch (err) { 
                console.warn("Auth failed, switching to local mode:", err.message);
                isLocalMode = true;
                document.getElementById('auth-status').innerText = "Running in Offline Mode";
            }
        }

        window.handleSignIn = async () => {
            const name = document.getElementById('username-input').value.trim();
            if (!name) return;
            
            userState.username = name;
            
            // Bypass waiting for auth if we already determined we are local
            if (isLocalMode) {
                loadAppLocal();
            } else {
                const btn = document.getElementById('login-btn');
                btn.disabled = true;
                btn.innerText = "Connecting...";
                
                // Final check for auth if not ready
                if (!authReady) {
                    await initAuth();
                }

                if (isLocalMode) {
                    loadAppLocal();
                } else {
                    loadAppCloud();
                }
            }
        };

        function loadAppLocal() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = `LOCAL: ${userState.username}`;
            document.getElementById('mode-badge').innerText = "Offline Mode";
            
            initGrid();
            // Load from localStorage
            const saved = localStorage.getItem(`seen_${userState.username}`);
            if (saved) {
                userState.seenIndices = JSON.parse(saved);
            }
            updateUI();
        }

        async function loadAppCloud() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = `ID: ${userState.username}`;
            
            initGrid();
            const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'user_progress', userState.username);
            
            onSnapshot(userDocRef, (snap) => {
                if (snap.exists()) {
                    userState.seenIndices = snap.data().seenIndices || [];
                    updateUI();
                } else {
                    setDoc(userDocRef, { seenIndices: [] });
                }
            }, (err) => {
                console.error("Firestore error, switching to local", err);
                isLocalMode = true;
                loadAppLocal();
            });
        }

        function initGrid() {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            questions.forEach((_, i) => {
                const b = document.createElement('button');
                b.id = `btn-${i}`;
                b.innerText = i + 1;
                b.className = "num-btn h-10 w-10 flex items-center justify-center text-[10px] font-bold rounded-lg border border-white/10 bg-white/5 hover:bg-white/20 text-white/50";
                b.onclick = () => displayQuestion(i, true);
                grid.appendChild(b);
            });
        }

        function updateUI() {
            questions.forEach((_, i) => {
                const btn = document.getElementById(`btn-${i}`);
                if (!btn) return;
                btn.classList.toggle('seen', userState.seenIndices.includes(i));
                btn.classList.toggle('active', i === lastIndex);
            });
            document.getElementById('progress-text').innerText = `${userState.seenIndices.length} / ${questions.length} DISCOVERED`;
        }

        window.displayQuestion = async (index, scroll) => {
            const container = document.getElementById('question-container');
            container.classList.add('fade-out');
            
            setTimeout(async () => {
                lastIndex = index;
                document.getElementById('question-number').innerText = `QUESTION #${index + 1}`;
                document.getElementById('question-content').innerText = questions[index];
                
                if (!userState.seenIndices.includes(index)) {
                    userState.seenIndices.push(index);
                    
                    if (isLocalMode) {
                        localStorage.setItem(`seen_${userState.username}`, JSON.stringify(userState.seenIndices));
                    } else {
                        const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'user_progress', userState.username);
                        await setDoc(userDocRef, { seenIndices: userState.seenIndices }, { merge: true });
                    }
                }
                
                updateUI();
                if (scroll) document.getElementById(`btn-${index}`).scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                container.classList.remove('fade-out');
            }, 300);
        };

        window.getRandomQuestion = () => {
            const pool = questions.map((_, i) => i).filter(i => !userState.seenIndices.includes(i));
            const idx = pool.length > 0 ? pool[Math.floor(Math.random() * pool.length)] : Math.floor(Math.random() * questions.length);
            displayQuestion(idx, false);
        };

        // Listen for enter key on login
        document.getElementById('username-input').onkeydown = (e) => e.key === 'Enter' && handleSignIn();
        
        initAuth();
    </script>
