<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A List of Interesting Questions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            color: #e9ecef;
        }
        .serif {
            font-family: 'Playfair Display', serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .question-text {
            line-height: 1.6;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .fade-out {
            opacity: 0;
            transform: translateY(10px);
        }
        .fade-in {
            opacity: 1;
            transform: translateY(0);
        }
        button:active {
            transform: scale(0.95);
        }
        .grid-container::-webkit-scrollbar {
            width: 6px;
        }
        .grid-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .grid-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        .num-btn {
            transition: all 0.2s ease;
        }
        .num-btn.active {
            background-color: #6366f1 !important;
            color: white !important;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
            border-color: #818cf8;
            transform: scale(1.1);
            z-index: 10;

        .num-btn.seen {
            background-color: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border-color: rgba(99, 102, 241, 0.3);
        }
        .hidden { display: none !important; }

", "Who was your childhood hero?", "What instantly makes you feel like a child again?", "What do you think happens after death?", "What is your perfect meal?", "What smallest thing can ruin your day?", "What is the most recent thing you taught yourself?", "What is something you wish people cared more about?", "How do you feel about the future right now?", "Who could you listen to for hours?", "What were the longest five minutes you’ve experienced?", "How would you want your children’s childhoods to be different?", "What is the best thing that happened this week?", "What’s the most beautiful view you’ve ever seen?", "What are you looking forward to?", "What activity makes you lose track of time?", "When do you feel like the best version of yourself?", "What keeps you up at night?", "Has media ever changed your worldview?", "Where would you haunt if you were a ghost?", "What physical feature of yours would a caricature blow out of proportion?", "What is something you and I might disagree on?",
            // Restoring remaining to reach 308...
            "What's your go-to comfort food when you're stressed?", "What's the most useless talent you have?", "If you could rename yourself, what name would you pick?", "What's the best part of your daily routine?", "What's the most daring thing you've ever done?", "What was your first impression of your best friend?", "What's the most expensive thing you've ever broken?", "What's the longest you've gone without sleep?", "If you could be an expert in any field instantly, what would it be?", "What's the most important lesson your parents taught you?", "What's the most beautiful sound in the world to you?", "What's a song you can't help but dance to?", "What's your favorite way to spend a rainy day?", "What's the most interesting thing you've ever found on the ground?", "If you could have any superpower, what would it be?", "What's the first thing you notice about a person?", "What's your favorite memory from school?", "What's the most rewarding thing you've ever done?", "What's the most unusual food you've ever tried?", "What's your favorite season and why?", "What's the most impressive thing you can cook?", "What's the best surprise you've ever received?", "What's the most important thing in a relationship?", "What's your favorite place in your home?", "What's the most difficult thing you've ever had to say?", "What's your favorite family memory?", "What's the most exciting thing you've ever won?", "What's your favorite thing about your best friend?", "What's the most embarrassing thing your parents ever did?", "What's the best movie you've seen this year?", "What's the most interesting place you've ever visited?", "What's your favorite way to relax?", "What's the most important thing you've learned this year?", "What's your favorite thing about yourself?", "What's the most beautiful place you've ever been to?", "What's your favorite book of all time?", "What's the most challenging project you've ever tackled?", "What's your favorite way to start the day?", "What's the most meaningful gift you've ever given?", "What's your favorite childhood toy?", "What's the most interesting person you've ever met?", "What's your favorite type of music?", "What's the most important quality in a leader?", "What's your favorite way to spend a weekend?", "What's the most beautiful piece of art you've ever seen?", "What's your favorite thing to do on a Friday night?", "What's the most interesting fact you know?", "What's your favorite hobby?", "What's the most important thing you've achieved?", "What's your favorite way to travel?", "What's the most beautiful sunset you've ever seen?", "What's your favorite thing about your job?", "What's the most interesting hobby you've ever heard of?", "What's your favorite way to exercise?", "What's the most beautiful flower you've ever seen?", "What's your favorite thing to do on a sunny day?", "What's the most interesting documentary you've ever watched?", "What's your favorite way to celebrate a special occasion?", "What's the most beautiful building you've ever seen?", "What's your favorite thing about your city?", "What's the most interesting museum you've ever visited?", "What's your favorite way to spend a holiday?", "What's the most beautiful beach you've ever been to?", "What's your favorite thing about your family?", "What's the most interesting story you've ever heard?", "What's your favorite way to spend a winter day?", "What's the most beautiful mountain you've ever seen?", "What's your favorite thing about your friends?", "What's the most interesting podcast you've ever listened to?", "What's your favorite way to spend a summer day?", "What's the most beautiful forest you've ever seen?", "What's your favorite thing about your childhood?", "What's the most interesting news story you've read recently?", "What's your favorite way to spend a spring day?", "What's the most beautiful river you've ever seen?", "What's your favorite thing about your culture?", "What's the most interesting culture you've ever experienced?", "What's your favorite way to spend an autumn day?", "What's the most beautiful garden you've ever seen?", "What's your favorite thing about your heritage?", "What's the most interesting language you've ever heard?", "What's your favorite way to spend a quiet evening?", "What's the most beautiful lake you've ever seen?", "What's your favorite thing about your community?", "What's the most interesting community you've ever been part of?", "What's your favorite way to spend a busy day?", "What's the most beautiful park you've ever seen?", "What's your favorite thing about your neighborhood?", "What's the most interesting neighborhood you've ever lived in?", "What's your favorite way to spend a morning?", "What's the most beautiful island you've ever visited?", "What's your favorite thing about your life right now?", "What's the most interesting thing you've learned today?", "What's your favorite way to spend an afternoon?", "What's the most beautiful bridge you've ever seen?", "What's your favorite thing about your future?", "What's the most interesting question you've ever been asked?", "What's your favorite way to spend a night?", "What's the most beautiful sky you've ever seen?", "What's your favorite thing about your past?", "What's the most interesting thing you've ever done for fun?", "What's your favorite way to spend a rainy afternoon?", "What's the most beautiful waterfall you've ever seen?", "What's your favorite thing about your personality?", "What's the most interesting animal you've ever seen?", "What's your favorite way to spend a snowy day?", "What's the most beautiful star you've ever seen?", "What's your favorite thing about your appearance?"
        ];

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'question-app-sync';

        let userState = {
            username: '',
            seenIndices: []
        };
        let lastIndex = -1;
        let currentUser = null;

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth initialization failed:", err);
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
        });

        document.getElementById('username-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSignIn();
        });

        window.handleSignIn = async () => {
            const name = document.getElementById('username-input').value.trim();
            if (!name) return;

            const loginBtn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('auth-error');
            
            loginBtn.innerText = "Syncing...";
            loginBtn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                if (!currentUser) {
                    await initAuth();
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                
                if (currentUser) {
                    loadUserProfile(name);
                } else {
                    throw new Error("Authentication failed");
                }
            } catch (err) {
                console.error(err);
                loginBtn.innerText = "Enter";
                loginBtn.disabled = false;
                errorMsg.classList.remove('hidden');
            }
        };

        window.signOut = () => {
            location.reload();
        };

        async function loadUserProfile(name) {
            userState.username = name;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = `Syncing: ${name}`;
            
            initGrid();

            const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'user_progress', name);
            
            onSnapshot(userDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    userState.seenIndices = docSnap.data().seenIndices || [];
                    updateUIState();
                } else {
                    setDoc(userDocRef, { seenIndices: [] }).catch(e => console.error("Init Doc Error:", e));
                }
            }, (err) => {
                console.error("Firestore error:", err);
            });
        }

        function initGrid() {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            for (let i = 0; i < questions.length; i++) {
                const btn = document.createElement('button');
                btn.id = `btn-${i}`;
                btn.innerText = i + 1;
                btn.className = "num-btn h-12 w-12 flex items-center justify-center text-sm font-semibold rounded-lg border border-white/10 bg-white/5 hover:bg-white/20 text-blue-100/70";
                btn.onclick = () => displayQuestion(i, true);
                grid.appendChild(btn);
            }
        }

        function updateUIState() {
            questions.forEach((_, i) => {
                const btn = document.getElementById(`btn-${i}`);
                if (btn) {
                    if (userState.seenIndices.includes(i)) {
                        btn.classList.add('seen');
                    }
                    if (i === lastIndex) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            });
            document.getElementById('progress-text').innerText = `${userState.seenIndices.length} / ${questions.length} Seen`;
        }

        window.displayQuestion = async (index, shouldScroll = false) => {
            const container = document.getElementById('question-container');
            const content = document.getElementById('question-content');
            const number = document.getElementById('question-number');

            container.classList.add('fade-out');

            setTimeout(async () => {
                lastIndex = index;
                number.innerText = `QUESTION #${index + 1}`;
                content.innerText = questions[index];
                
                if (currentUser && userState.username && !userState.seenIndices.includes(index)) {
                    userState.seenIndices.push(index);
                    const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'user_progress', userState.username);
                    await setDoc(userDocRef, { seenIndices: userState.seenIndices }, { merge: true }).catch(e => console.error("Save Progress Error:", e));
                }

                updateUIState();
                
                if (shouldScroll) {
                    const target = document.getElementById(`btn-${index}`);
                    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
                
                container.classList.remove('fade-out');
            }, 300);
        };

        window.getRandomQuestion = () => {
            const unseen = questions.map((_, i) => i).filter(i => !userState.seenIndices.includes(i));
            let randomIndex;
            
            if (unseen.length > 0) {
                randomIndex = unseen[Math.floor(Math.random() * unseen.length)];
            } else {
                do {
                    randomIndex = Math.floor(Math.random() * questions.length);
                } while (randomIndex === lastIndex && questions.length > 1);
            }
            
            window.displayQuestion(randomIndex, false);
        };

        initAuth();
    </script>
</body>
