<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A List of Interesting Questions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            color: #e9ecef;
        }
        .serif {
            font-family: 'Playfair Display', serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .question-text {
            line-height: 1.6;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .fade-out {
            opacity: 0;
            transform: translateY(10px);
        }
        .fade-in {
            opacity: 1;
            transform: translateY(0);
        }
        button:active {
            transform: scale(0.95);
        }
        .grid-container::-webkit-scrollbar {
            width: 6px;
        }
        .grid-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .grid-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        .num-btn {
            transition: all 0.2s ease;
        }
        .num-btn.active {
            background-color: #6366f1 !important;
            color: white !important;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            border-color: #818cf8;
        }
        .num-btn.seen {
            background-color: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border-color: rgba(99, 102, 241, 0.3);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-start p-6 md:p-12">

    <!-- Auth Overlay -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-md">
        <div class="glass-card p-8 rounded-3xl max-w-sm w-full text-center space-y-4">
            <h2 class="serif text-2xl text-white">Start Thinking</h2>
            <p class="text-sm text-slate-400">Enter your nickname to sync your progress across devices.</p>
            
            <div class="space-y-3 text-left">
                <label class="text-[10px] uppercase tracking-widest text-slate-500 ml-1">Nickname</label>
                <input type="text" id="username-input" value="Mega boss" placeholder="e.g. Mega boss" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <button id="login-btn" onclick="handleSignIn()" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-indigo-500/20">Enter</button>
        </div>
    </div>

    <div id="app-content" class="max-w-4xl w-full text-center space-y-8 hidden">
        <header class="flex justify-between items-center">
            <div class="text-left">
                <p id="user-display" class="text-indigo-400 font-mono text-xs uppercase tracking-widest"></p>
                <button onclick="signOut()" class="text-[10px] text-slate-500 hover:text-white underline">Change Nickname</button>
            </div>
            <div class="text-right">
                <p id="progress-text" class="text-[10px] text-slate-400 uppercase tracking-widest">0 / 0 Seen</p>
            </div>
        </header>

        <header class="space-y-4">
            <h1 class="serif text-3xl md:text-5xl lg:text-6xl text-transparent bg-clip-text bg-gradient-to-r from-blue-200 to-indigo-400 font-bold leading-tight">
                A List of Interesting Questions
            </h1>
        </header>

        <main class="glass-card rounded-3xl p-8 md:p-16 min-h-[300px] flex flex-col items-center justify-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-32 h-32 bg-blue-500/10 blur-3xl rounded-full -translate-x-1/2 -translate-y-1/2"></div>
            
            <div id="question-container" class="question-text fade-in w-full">
                <p id="question-number" class="text-indigo-400 font-mono text-sm mb-4 tracking-widest uppercase">Select a question</p>
                <h2 id="question-content" class="text-xl md:text-2xl lg:text-3xl font-light text-white italic">
                    Ready to dive deep?
                </h2>
            </div>
        </main>

        <div class="flex flex-col items-center space-y-8">
            <button id="random-btn" onclick="getRandomQuestion()" class="group relative px-10 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-full transition-all duration-200 shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/40 transform hover:-translate-y-1">
                <span class="flex items-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" />
                    </svg>
                    <span>Random Question</span>
                </span>
            </button>

            <div class="w-full space-y-4">
                <p class="text-blue-300/40 text-xs uppercase tracking-tighter">Jump to a specific number</p>
                <div id="grid-container" class="grid-container grid grid-cols-8 sm:grid-cols-10 md:grid-cols-14 lg:grid-cols-20 gap-1 max-h-48 overflow-y-auto p-4 glass-card rounded-xl border-indigo-500/10">
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const questions = [

            "Think of the best teacher you've ever had. What did they teach, and what made them so special?",
            "What is something you never thought you'd be able to do, until you actually did it?",

            "If you had the power to completely eradicate one disease, which would you choose to abolish?",
            "If you had the power to completely solve one social or political issue affecting the world today, which would you choose?",

            "Have you ever challenged or questioned a belief you held for a long time? What prompted it and what was the result?",
            "What, if anything, is too serious to be joked about?",
            "What's the coolest project you've ever worked on?",
            "Are you currently pursuing what makes you happy? Why or why not?",
            "What did you know was a mistake as soon as you decided to do it, and why did you go through with it anyway?",
            "In what ways are you stubborn?",

            "What are you most likely to be arrested for?",
            "Think of your biggest regret. If you could go back in time and make a decision to keep it from happening, would you?",
            "If you could be any animal, what would you be and why?",
            "What is the worst thing about the place you live?",

            "Who would you like to be for a day and have them inhabit your body?",
            "What's a quirk of yours that few people know about?",

            "Was there ever a moment when you thought you were going to die?",

            "What would you like to accomplish before the year is over?",
            "Have you ever been offered a good opportunity but refused?",
            "Would you prefer your family to be smaller or larger than it is now?",
            "What is something you're hypocritical about?",
            "Has anyone close to you ever died?",
            "What is something you're inherently bad at?",
            "Do you have any inherent talents?",
            "What small, insignificant thing gives you joy?",
            "Where would you live and what would your dwelling be like?",
            "In the movie Inside Out, what's one of your core memories?",
            "What is the biggest mistake you've made that actually turned out alright?",
            "What's the best decision you've ever made?",
            "What are some core principles you have that you'll never give up or change?",
            "What cause do you strongly support, even though it wouldn't directly benefit you?",
            "What book, movie, film, or video game had the best ending?",
            "What is one thing you're tired of telling/explaining to people?",
            "What embarrassing memory will forever be burned into your mind?",
            "What is one thing you're good at that people don't expect?",
            "In what way do you differ most from your parents?",
            "What stereotype are you most like?",
            "What is one thing you're proud you haven't done?",
            "What is something that's difficult for you but easy for most other people?",
            "What are you glad you learned as a child?",
            "What is something you want but will never have?",
            "What is a quote that speaks to you, and why do you like it?",
            "What advice do you wish you'd received earlier?",
            "What was the best compliment you've ever received?",
            "What character trait instantly makes you respect someone?",
            "What is an \"everyday evil\" you experience often?",
            "What person you know do you look up to most and why?",
            "What historical figure would you most like to sit and have a conversation with?",
            "How long is your ideal lifespan?",
            "How are you? No, really. How are you really?",
            "What were you severely underprepared for?",
            "If you could live in any fictional world, where would it be and why?",
            "What is your least favorite question to answer?",
            "What wouldn't you do for someone you love?",
            "What's the best gift you've ever received?",
            "What changed the way you see the world?",
            "If you died today, what would be your biggest regret?",
            "What will never cease to make you smile?",
            "What was the last song that got stuck in your head?",
            "Assume that god exists. What do you ask him?",
            "What do you wish you remembered better?",
            "Who is the single best person you have ever met?",
            "What do you think is worth dying for, if anything?",
            "What's your favorite memory with your best friend?",
            "What object best defines who you are?",
            "What would the ideal version of your life look like?",
            "What was the most recent thing that made you belly laugh?",
            "You have the opportunity to give a 10 minute speech which will be broadcast worldwide. What do you say?",
            "What person in your life would you most want to be stuck in an elevator with?",
            "What gives you hope for the future?",

            "What outfit makes you feel invincible?",
            "What current trend do you find troubling and why?",
            "A stranger is inhabiting your body for the day. What are some tips you’d give them?",
            "Who was your childhood hero? Do you still look up to them?",
            "What instantly makes you feel like a child again?",
            "What do you think happens after we die, if anything?",
            "What is your perfect meal?",
            "What is the smallest thing that can ruin your day?",
            "What is the most recent thing you taught yourself?",
            "What is something you wish people cared more about?",
            "How do you feel about the future right now?",
            "Who could you listen to for hours?",
            "What were the longest five minutes you’ve ever experienced?",
            "How would you want your children’s childhoods to be different?",
            "What is the best thing that happened to you this week?",
            "What’s the most beautiful view you’ve ever seen?",
            "What are you looking forward to?",
            "What activity makes you lose track of time?",
            "When do you feel like the best version of yourself?",
            "What keeps you up at night?",
            "Has a piece of media ever changed the way you thought about the world?",
            "If you were a ghost tied to one location, where would you haunt?",
            "What physical feature of yours would a caricature artist blow out of proportion?",
            "What is something you and I disagree on?"
        ];

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'question-app-sync';

        let userState = {
            username: '',
            seenIndices: []
        };
        let lastIndex = -1;
        let currentUser = null;

        async function initAuth() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
        });

        document.getElementById('username-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSignIn();
        });

        window.handleSignIn = async () => {
            const name = document.getElementById('username-input').value.trim();
            if (!name) return;

            const loginBtn = document.getElementById('login-btn');
            loginBtn.innerText = "Syncing...";
            loginBtn.disabled = true;

            if (currentUser) {
                loadUserProfile(name);
            }
        };

        window.signOut = () => {
            location.reload();
        };

        async function loadUserProfile(name) {
            if (!currentUser) return;

            userState.username = name;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = `Syncing: ${name}`;
            
            initGrid();

            const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'user_progress', name);
            
            onSnapshot(userDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    userState.seenIndices = docSnap.data().seenIndices || [];
                    updateUIState();
                } else {
                    setDoc(userDocRef, { seenIndices: [] }).catch(e => console.error("Init Doc Error:", e));
                }
            }, (err) => {
                console.error("Firestore error:", err);
            });
        }

        function initGrid() {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            for (let i = 0; i < questions.length; i++) {
                const btn = document.createElement('button');
                btn.id = `btn-${i}`;
                btn.innerText = i + 1;
                btn.className = "num-btn h-8 w-8 flex items-center justify-center text-[10px] rounded border border-white/5 bg-white/5 hover:bg-white/20 text-blue-200/60";
                btn.onclick = () => displayQuestion(i);
                grid.appendChild(btn);
            }
        }

        function updateUIState() {
            questions.forEach((_, i) => {
                const btn = document.getElementById(`btn-${i}`);
                if (btn) {
                    if (userState.seenIndices.includes(i)) {
                        btn.classList.add('seen');
                    }
                    if (i === lastIndex) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            });
            document.getElementById('progress-text').innerText = `${userState.seenIndices.length} / ${questions.length} Seen`;
        }

        window.displayQuestion = async (index) => {
            const container = document.getElementById('question-container');
            const content = document.getElementById('question-content');
            const number = document.getElementById('question-number');

            container.classList.add('fade-out');

            setTimeout(async () => {
                lastIndex = index;
                number.innerText = `QUESTION #${index + 1}`;
                content.innerText = questions[index];
                
                if (currentUser && userState.username && !userState.seenIndices.includes(index)) {
                    userState.seenIndices.push(index);
                    const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'user_progress', userState.username);
                    await setDoc(userDocRef, { seenIndices: userState.seenIndices }, { merge: true }).catch(e => console.error("Save Progress Error:", e));
                }

                updateUIState();
                
                const target = document.getElementById(`btn-${index}`);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                
                container.classList.remove('fade-out');
            }, 300);
        };

        window.getRandomQuestion = () => {
            const unseen = questions.map((_, i) => i).filter(i => !userState.seenIndices.includes(i));
            let randomIndex;
            
            if (unseen.length > 0) {
                randomIndex = unseen[Math.floor(Math.random() * unseen.length)];
            } else {
                do {
                    randomIndex = Math.floor(Math.random() * questions.length);
                } while (randomIndex === lastIndex && questions.length > 1);
            }
            
            window.displayQuestion(randomIndex);
        };

        initAuth();
    </script>
</body>
</html>
