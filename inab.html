<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Budget - Personal & Joint</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💸</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .progress-bar { transition: width 0.3s ease; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .tab-active { border-bottom: 3px solid #6366f1; color: #818cf8; }
        
        .autocomplete-items {
            position: absolute;
            z-index: 99;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        .category-card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
            border: 2px dashed #6366f1;
        }
        
        .drag-handle {
            cursor: grab;
        }
        
        .drag-handle:active {
            cursor: grabbing;
        }

        .modal-backdrop {
            background-color: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(4px);
        }

        .split-indicator {
            position: relative;
        }
        .split-indicator::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: currentColor;
            border-radius: 4px;
            opacity: 0.5;
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen font-sans text-slate-200">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="flex flex-col mb-8 gap-6">
            <div class="flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <h1 class="text-3xl font-black text-slate-100 tracking-tight">Zero Budget</h1>
                    <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                        <button onclick="switchBudget('joint')" id="btnBudgetJoint" class="px-4 py-2 rounded-lg text-sm font-bold transition"></button>
                        <button onclick="switchBudget('personal')" id="btnBudgetPersonal" class="px-4 py-2 rounded-lg text-sm font-bold transition"></button>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="openSettings()" class="bg-slate-900 border border-slate-800 p-2 rounded-lg text-slate-400 hover:text-white transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0 l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                    <div class="w-px h-8 bg-slate-800 mx-1"></div>
                    <button onclick="document.getElementById('csvImportInput').click()" class="bg-slate-900 border border-slate-800 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-800 transition text-slate-300">Import</button>
                    <input type="file" id="csvImportInput" accept=".csv" class="hidden" onchange="importFromCSV(event)">
                    <button onclick="exportToCSV()" class="bg-slate-900 border border-slate-800 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-800 transition text-slate-300">Export</button>
                    <button onclick="clearData()" class="bg-red-950/30 text-red-400 border border-red-900/50 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-red-900/40 transition">Reset</button>
                </div>
            </div>

            <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                <div class="flex flex-wrap items-center justify-between gap-4 mb-2">
                    <div class="flex items-center gap-4">
                        <button onclick="changeYear(-1)" class="text-slate-500 hover:text-white p-2">◀</button>
                        <span id="currentYearDisplay" class="text-xl font-bold text-indigo-400 min-w-[60px] text-center"></span>
                        <button onclick="changeYear(1)" class="text-slate-500 hover:text-white p-2">▶</button>
                    </div>
                    <div id="monthGrid" class="grid grid-cols-4 md:grid-cols-6 lg:grid-cols-12 gap-2 flex-1"></div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7 space-y-6">
                <!-- Budget Pool -->
                <div id="mainPoolCard" class="p-8 rounded-3xl shadow-2xl transition-colors duration-500">
                    <div class="flex justify-between items-center mb-4">
                        <span id="poolBudgetLabel" class="text-indigo-100 font-bold uppercase tracking-wider text-sm">Budget</span>
                        <span id="poolMonthLabel" class="bg-black/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest"></span>
                    </div>
                    <div class="flex items-center justify-between gap-4">
                        <div class="flex items-baseline gap-2">
                            <span class="text-5xl font-bold opacity-70">$</span>
                            <span id="displayTotalPool" class="text-5xl font-bold tracking-tight">0.00</span>
                        </div>
                        <div class="text-right">
                            <div class="text-xs font-bold uppercase tracking-widest opacity-70 mb-1">Month Total Spent</div>
                            <div class="text-2xl font-mono font-bold text-white">-$<span id="displayMonthSpend">0.00</span></div>
                        </div>
                    </div>
                    
                    <div class="mt-8 pt-6 border-t border-white/10 grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest opacity-70 mb-2">Manual Funds (Month)</label>
                            <input type="number" id="manualBase" oninput="updateManualBase(this.value)" placeholder="0" class="bg-black/20 text-white px-4 py-3 rounded-xl focus:outline-none w-full font-mono border border-white/5 text-lg">
                        </div>
                        <div id="unassignedWarning" class="bg-black/20 p-4 rounded-xl flex flex-col justify-center border border-white/5">
                            <span class="text-xs uppercase font-bold opacity-70 mb-1">Left to Assign</span>
                            <span id="leftToDistribute" class="font-mono font-bold text-2xl leading-none">$0.00</span>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                    <div class="flex gap-2 items-center">
                        <input type="text" id="newCatName" onkeydown="if(event.key==='Enter') addCategory()" placeholder="New Category..." class="flex-1 bg-slate-800 border border-slate-700 p-4 rounded-xl focus:outline-none text-slate-200">
                        <button id="btnAddCategory" onclick="addCategory()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-500 transition">Add</button>
                    </div>
                </div>

                <div id="categoryList" class="space-y-4"></div>
            </div>

            <div class="lg:col-span-5 space-y-6">
                <!-- Templates -->
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-sm">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4 flex justify-between items-center">
                        Templates
                        <button onclick="toggleTemplateForm()" id="btnToggleTemplate" class="bg-indigo-600/20 text-indigo-400 hover:bg-indigo-600/30 px-3 py-1 rounded-md text-xs font-bold transition">+ New</button>
                    </h2>
                    <div id="templateForm" class="hidden mb-6 p-5 bg-slate-800/50 rounded-2xl border border-slate-700 space-y-4">
                        <input type="text" id="tempName" placeholder="Label..." class="w-full bg-slate-900 p-3 rounded-xl text-sm border border-slate-700">
                        <input type="number" id="tempAmount" placeholder="Amount" class="w-full bg-slate-900 p-3 rounded-xl text-sm border border-slate-700">
                        <input type="text" id="tempPayee" placeholder="Payee" class="w-full bg-slate-900 p-3 rounded-xl text-sm border border-slate-700">
                        <select id="tempCategory" class="w-full bg-slate-900 p-3 rounded-xl text-sm border border-slate-700"></select>
                        <button id="btnSaveTemplate" onclick="saveTemplate()" class="w-full bg-indigo-600 py-3 rounded-xl text-sm font-bold shadow-lg">Save Template</button>
                    </div>
                    <div id="templateList" class="flex flex-wrap gap-2"></div>
                </div>

                <!-- Logger -->
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-sm relative">
                    <div class="flex border-b border-slate-800 mb-6">
                        <button id="tabExpense" onclick="setTxType('expense')" class="flex-1 py-3 font-bold text-sm tab-active uppercase tracking-widest">Expense</button>
                        <button id="tabIncome" onclick="setTxType('income')" class="flex-1 py-3 font-bold text-sm text-slate-500 uppercase tracking-widest">Income</button>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="date" id="tDate" class="bg-slate-800 border border-slate-700 p-3 rounded-xl w-full text-sm">
                            <input type="number" id="tAmount" oninput="updateRemainderDisplay()" placeholder="0.00" class="bg-slate-800 border border-slate-700 p-3 rounded-xl w-full text-base font-bold">
                        </div>
                        <div class="relative">
                            <input type="text" id="tPayee" placeholder="Payee" autocomplete="off" onfocus="showAllPayees()" class="bg-slate-800 border border-slate-700 p-3 rounded-xl w-full text-sm">
                            <div id="autocompleteList" class="autocomplete-items hidden bg-slate-900 border border-slate-700 rounded-xl mt-1 shadow-2xl"></div>
                        </div>
                        <input type="text" id="tConcept" placeholder="Concept / Notes" class="bg-slate-800 border border-slate-700 p-3 rounded-xl w-full text-sm">
                        
                        <div id="categoryArea">
                            <!-- Single Category or Splits go here -->
                            <div id="singleCategoryWrapper">
                                <select id="tCategory" class="bg-slate-800 border border-slate-700 p-3 rounded-xl w-full text-sm"></select>
                            </div>
                            <div id="splitCategoryWrapper" class="hidden space-y-3">
                                <div id="splitList" class="space-y-2"></div>
                                <button onclick="addSplitRow()" class="text-xs font-bold text-indigo-400 hover:text-indigo-300">+ Add Split Row</button>
                            </div>
                        </div>

                        <div class="flex items-center justify-between px-1">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="splitToggle" onchange="toggleSplitMode()" class="w-4 h-4 rounded border-slate-700 bg-slate-800 text-indigo-600 focus:ring-indigo-600">
                                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Split Expense</span>
                            </label>
                            <span id="splitRemainder" class="text-[10px] font-mono text-slate-500 hidden"></span>
                        </div>

                        <button onclick="addTransaction()" id="btnSubmit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black transition text-xl shadow-xl uppercase tracking-tighter">Log Transaction</button>
                    </div>
                </div>

                <!-- Ledger -->
                <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
                    <div class="p-4 bg-slate-800/50 border-b border-slate-800 flex justify-between items-center cursor-pointer" onclick="clearLedgerFilter()">
                        <h2 class="font-bold text-slate-300">History: <span id="ledgerTitle" class="text-indigo-400"></span></h2>
                        <span class="text-[10px] text-slate-500 uppercase font-black px-2 py-1 bg-slate-900 rounded border border-slate-700" id="transactionCount">0</span>
                    </div>
                    <div id="ledger" class="max-h-[600px] overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteConfirmModal" class="fixed inset-0 z-[300] hidden flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-slate-900 w-full max-w-sm rounded-3xl border border-slate-800 shadow-2xl p-8 text-center">
            <div class="w-16 h-16 bg-red-950/30 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            </div>
            <h3 class="text-xl font-bold mb-2">Delete Template?</h3>
            <p class="text-slate-400 text-sm mb-8">This action cannot be undone. Are you sure you want to remove this template?</p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeDeleteModal()" class="bg-slate-800 text-slate-300 py-3 rounded-xl font-bold hover:bg-slate-700 transition">Cancel</button>
                <button id="btnConfirmDelete" class="bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-500 transition">Delete</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-slate-900 w-full max-w-lg rounded-3xl border border-slate-800 shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <h2 class="text-xl font-bold">Settings</h2>
                <button onclick="closeSettings()" class="text-slate-500 hover:text-white">✕</button>
            </div>
            <div class="p-6 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Primary Budget Name</label>
                        <input type="text" id="settingJointName" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Secondary Budget Name</label>
                        <input type="text" id="settingPersonalName" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl">
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 right-8 bg-indigo-600 text-white px-6 py-4 rounded-2xl shadow-2xl transform translate-y-32 transition duration-300 opacity-0 pointer-events-none z-[400] font-bold border border-white/10"></div>

    <script>
        const STORAGE_KEY = 'zero_budget_v11_splits';
        let state = {
            activeBudgetId: 'joint',
            ledgerFilterCatId: null,
            settings: { jointName: "El Nuestro", personalName: "El Mío" },
            budgets: {
                joint: { monthlyBases: {}, categories: [], assignments: {}, transactions: [], templates: [] },
                personal: { monthlyBases: {}, categories: [], assignments: {}, transactions: [], templates: [] }
            },
            currentTxType: 'expense',
            selectedYear: new Date().getFullYear(),
            selectedMonth: new Date().getMonth() + 1,
            isSplitMode: false,
            activeSplits: [{ catId: '', amount: '' }]
        };

        const monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        let templateToDeleteId = null;

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) state = JSON.parse(saved);
            
            ['joint', 'personal'].forEach(bId => {
                if (state.budgets[bId].categories.length === 0) {
                    ["Las Niñas", "Groceries", "Dining Out", "Munchies", "CFE", "Stuff I Forgot"].forEach((name, i) => {
                        state.budgets[bId].categories.push({ id: Date.now() + i, name });
                    });
                }
            });
            document.getElementById('tDate').valueAsDate = new Date();
            initAutocomplete();
            initDragAndDrop();
            render();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            render();
        }

        function getSelectedMonth() { return `${state.selectedYear}-${String(state.selectedMonth).padStart(2, '0')}`; }

        function switchBudget(id) {
            state.activeBudgetId = id;
            state.ledgerFilterCatId = null;
            state.isSplitMode = false;
            saveData();
        }

        function setMonth(m) { state.selectedMonth = m; saveData(); }
        function changeYear(offset) { state.selectedYear += offset; saveData(); }
        function updateManualBase(val) { state.budgets[state.activeBudgetId].monthlyBases[getSelectedMonth()] = parseFloat(val) || 0; saveData(); }

        function updateRemainderDisplay() {
            if (!state.isSplitMode) return;
            const total = parseFloat(document.getElementById('tAmount').value) || 0;
            const currentSum = state.activeSplits.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
            const remainderEl = document.getElementById('splitRemainder');
            if (remainderEl) {
                remainderEl.innerText = `Remainder: $${(total - currentSum).toFixed(2)}`;
                // Visual cue if balanced
                if (Math.abs(total - currentSum) < 0.01 && total > 0) {
                    remainderEl.classList.replace('text-slate-500', 'text-emerald-400');
                } else {
                    remainderEl.classList.replace('text-emerald-400', 'text-slate-500');
                }
            }
        }

        function updateSplit(idx, field, val) {
            // Update the state object silently
            state.activeSplits[idx][field] = field === 'catId' ? (parseInt(val) || '') : (parseFloat(val) || 0);
            
            // If it's a category change, we might want a full render to sync names, 
            // but for amounts, we MUST NOT render to keep focus.
            if (field === 'catId') {
                saveData(); // This calls render, which is fine for a dropdown selection
            } else {
                updateRemainderDisplay(); // Only update the label, keep focus in input
            }
        }

        function addCategory(nameStr = null) {
            const budget = state.budgets[state.activeBudgetId];
            const name = nameStr || document.getElementById('newCatName').value.trim();
            if (!name) return;
            const existing = budget.categories.find(c => c.name.toLowerCase() === name.toLowerCase());
            if (existing) return existing.id;
            const newId = Date.now() + Math.floor(Math.random() * 1000);
            budget.categories.unshift({ id: newId, name });
            if (!nameStr) { document.getElementById('newCatName').value = ''; saveData(); }
            return newId;
        }

        function updateAssigned(catId, amount) {
            const budget = state.budgets[state.activeBudgetId];
            const m = getSelectedMonth();
            if (!budget.assignments[m]) budget.assignments[m] = {};
            budget.assignments[m][catId] = parseFloat(amount) || 0;
            saveData();
        }

        function filterLedgerByCategory(catId) { state.ledgerFilterCatId = catId; saveData(); }
        function clearLedgerFilter() { state.ledgerFilterCatId = null; saveData(); }

        function toggleSplitMode() {
            state.isSplitMode = document.getElementById('splitToggle').checked;
            if (state.isSplitMode && state.activeSplits.length === 0) {
                state.activeSplits = [{ catId: '', amount: '' }];
            }
            render();
        }

        function addSplitRow() {
            state.activeSplits.push({ catId: '', amount: '' });
            render();
        }

        /* REMOVED DUPLICATE updateSplit function that was calling render() */

        function removeSplitRow(idx) {
            state.activeSplits.splice(idx, 1);
            if (state.activeSplits.length === 0) state.activeSplits = [{ catId: '', amount: '' }];
            render();
        }

        function toggleTemplateForm() {
            const f = document.getElementById('templateForm');
            f.classList.toggle('hidden');
            document.getElementById('btnToggleTemplate').innerText = f.classList.contains('hidden') ? '+ New' : 'Cancel';
        }

        function saveTemplate() {
            const budget = state.budgets[state.activeBudgetId];
            const name = document.getElementById('tempName').value.trim();
            const amount = parseFloat(document.getElementById('tempAmount').value) || null;
            const payee = document.getElementById('tempPayee').value.trim();
            const catId = document.getElementById('tempCategory').value;
            if (!name || !payee || !catId) return showToast("Required: Name, Payee, Category");
            budget.templates.push({ id: Date.now(), name, amount, payee, catId: parseInt(catId) });
            toggleTemplateForm();
            saveData();
        }

        function applyTemplate(tid) {
            const t = state.budgets[state.activeBudgetId].templates.find(item => item.id === tid);
            if (!t) return;
            document.getElementById('tPayee').value = t.payee;
            document.getElementById('tCategory').value = t.catId;
            if (t.amount) document.getElementById('tAmount').value = t.amount;
            state.isSplitMode = false;
            document.getElementById('splitToggle').checked = false;
            render();
        }

        function promptDeleteTemplate(tid, e) {
            e.stopPropagation();
            templateToDeleteId = tid;
            document.getElementById('deleteConfirmModal').classList.remove('hidden');
            document.getElementById('btnConfirmDelete').onclick = () => {
                const b = state.budgets[state.activeBudgetId];
                b.templates = b.templates.filter(t => t.id !== templateToDeleteId);
                closeDeleteModal();
                saveData();
                showToast("Template Deleted");
            };
        }

        function closeDeleteModal() {
            document.getElementById('deleteConfirmModal').classList.add('hidden');
            templateToDeleteId = null;
        }

        function addTransaction() {
            const budget = state.budgets[state.activeBudgetId];
            const date = document.getElementById('tDate').value;
            const totalAmount = parseFloat(document.getElementById('tAmount').value);
            const payee = document.getElementById('tPayee').value.trim();
            const concept = document.getElementById('tConcept').value.trim();

            if (!totalAmount || isNaN(totalAmount)) return showToast("Amount is required");

            const tx = { id: Date.now(), type: state.currentTxType, date, amount: totalAmount, payee, concept };

            if (state.currentTxType === 'expense') {
                if (state.isSplitMode) {
                    const splitSum = state.activeSplits.reduce((s, row) => s + (row.amount || 0), 0);
                    if (Math.abs(splitSum - totalAmount) > 0.01) return showToast(`Splits ($${splitSum}) must equal total ($${totalAmount})`);
                    tx.isSplit = true;
                    tx.splits = state.activeSplits.filter(s => s.catId && s.amount);
                } else {
                    const cid = parseInt(document.getElementById('tCategory').value);
                    if (!cid) return showToast("Category required");
                    tx.catId = cid;
                }
            }

            budget.transactions.unshift(tx);
            document.getElementById('tAmount').value = '';
            document.getElementById('tPayee').value = '';
            document.getElementById('tConcept').value = '';
            state.activeSplits = [{ catId: '', amount: '' }];
            saveData();
            showToast("Logged");
        }

        function openSettings() {
            document.getElementById('settingJointName').value = state.settings.jointName;
            document.getElementById('settingPersonalName').value = state.settings.personalName;
            document.getElementById('settingsModal').classList.remove('hidden');
        }
        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
        function saveSettings() {
            state.settings.jointName = document.getElementById('settingJointName').value || "El Nuestro";
            state.settings.personalName = document.getElementById('settingPersonalName').value || "El Mío";
            closeSettings();
            saveData();
        }

        function render() {
            const mKey = getSelectedMonth();
            const budget = state.budgets[state.activeBudgetId];
            const isPersonal = state.activeBudgetId === 'personal';
            const color = isPersonal ? 'emerald' : 'indigo';

            document.getElementById('btnBudgetJoint').innerText = state.settings.jointName;
            document.getElementById('btnBudgetPersonal').innerText = state.settings.personalName;
            document.getElementById('currentYearDisplay').innerText = state.selectedYear;
            
            const btnJ = document.getElementById('btnBudgetJoint');
            const btnP = document.getElementById('btnBudgetPersonal');
            btnJ.className = `px-4 py-2 rounded-lg text-sm font-bold transition ${!isPersonal ? 'bg-indigo-600 text-white' : 'text-slate-400'}`;
            btnP.className = `px-4 py-2 rounded-lg text-sm font-bold transition ${isPersonal ? 'bg-emerald-600 text-white' : 'text-slate-400'}`;

            const poolCard = document.getElementById('mainPoolCard');
            poolCard.className = `p-8 rounded-3xl shadow-2xl transition-colors duration-500 text-white bg-${color}-700 shadow-${color}-950/20`;

            const monthGrid = document.getElementById('monthGrid');
            monthGrid.innerHTML = monthNames.map((n, i) => {
                const active = (i + 1) === state.selectedMonth;
                return `<button onclick="setMonth(${i+1})" class="py-2 rounded-xl text-xs font-bold border border-slate-800 transition ${active ? `bg-${color}-600 border-${color}-400 text-white` : 'bg-slate-800/50 text-slate-400'}">${n}</button>`;
            }).join('');

            const base = budget.monthlyBases[mKey] || 0;
            document.getElementById('manualBase').value = base;
            const incomes = budget.transactions.filter(t => t.type === 'income' && t.date.startsWith(mKey)).reduce((a, b) => a + b.amount, 0);
            const totalPool = base + incomes;
            document.getElementById('displayTotalPool').innerText = totalPool.toLocaleString('en-US', { minimumFractionDigits: 2 });
            document.getElementById('poolBudgetLabel').innerText = isPersonal ? state.settings.personalName : state.settings.jointName;
            document.getElementById('poolMonthLabel').innerText = `${monthNames[state.selectedMonth-1]} ${state.selectedYear}`;

            const spent = budget.transactions.filter(t => t.type === 'expense' && t.date.startsWith(mKey)).reduce((a, b) => a + b.amount, 0);
            document.getElementById('displayMonthSpend').innerText = spent.toLocaleString('en-US', { minimumFractionDigits: 2 });

            const assigned = Object.values(budget.assignments[mKey] || {}).reduce((a, b) => a + b, 0);
            const left = totalPool - assigned;
            const leftEl = document.getElementById('leftToDistribute');
            leftEl.innerText = `$${left.toLocaleString('en-US', { minimumFractionDigits: 2 })}`;
            leftEl.className = left < 0 ? "font-mono font-bold text-2xl text-red-400" : `font-mono font-bold text-2xl text-${color}-400`;

            // Split UI
            const splitWrapper = document.getElementById('splitCategoryWrapper');
            const singleWrapper = document.getElementById('singleCategoryWrapper');
            const remainderEl = document.getElementById('splitRemainder');
            if (state.isSplitMode) {
                splitWrapper.classList.remove('hidden');
                singleWrapper.classList.add('hidden');
                const total = parseFloat(document.getElementById('tAmount').value) || 0;
                const currentSum = state.activeSplits.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
                remainderEl.innerText = `Remainder: $${(total - currentSum).toFixed(2)}`;
                remainderEl.classList.remove('hidden');
                document.getElementById('splitList').innerHTML = state.activeSplits.map((s, i) => `
                    <div class="flex gap-2 items-center">
                        <select onchange="updateSplit(${i}, 'catId', this.value)" class="flex-1 bg-slate-800 border border-slate-700 p-2 rounded-lg text-xs">
                            <option value="">Category</option>
                            ${budget.categories.map(c => `<option value="${c.id}" ${s.catId === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
                        </select>
                        <input type="number" placeholder="Amt" value="${s.amount}" oninput="updateSplit(${i}, 'amount', this.value)" class="w-20 bg-slate-800 border border-slate-700 p-2 rounded-lg text-xs font-bold">
                        <button onclick="removeSplitRow(${i})" class="text-slate-600 hover:text-red-500 text-sm">✕</button>
                    </div>
                `).join('');
            } else {
                splitWrapper.classList.add('hidden');
                singleWrapper.classList.remove('hidden');
                remainderEl.classList.add('hidden');
            }

            // Categories
            document.getElementById('categoryList').innerHTML = budget.categories.map(cat => {
                const lifeAssigned = Object.keys(budget.assignments).reduce((a, m) => a + (budget.assignments[m][cat.id] || 0), 0);
                const lifeSpent = budget.transactions.filter(t => t.type === 'expense').reduce((a, t) => {
                    if (t.isSplit) {
                        return a + (t.splits.find(s => s.catId === cat.id)?.amount || 0);
                    }
                    return a + (t.catId === cat.id ? t.amount : 0);
                }, 0);
                const bal = lifeAssigned - lifeSpent;
                const currentAssigned = budget.assignments[mKey]?.[cat.id] || 0;
                const currentSpent = budget.transactions.filter(t => t.date.startsWith(mKey)).reduce((a, t) => {
                    if (t.isSplit) return a + (t.splits.find(s => s.catId === cat.id)?.amount || 0);
                    return a + (t.catId === cat.id ? t.amount : 0);
                }, 0);
                const pct = Math.min(100, (currentSpent / (currentAssigned || 1)) * 100);

                return `
                    <div class="category-card bg-slate-900 p-6 rounded-2xl border border-slate-800" draggable="true" data-id="${cat.id}">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex gap-3">
                                <div class="drag-handle text-slate-700 mt-1"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg></div>
                                <div>
                                    <h3 onclick="filterLedgerByCategory(${cat.id})" class="font-bold text-lg hover:text-${color}-400 cursor-pointer">${cat.name}</h3>
                                    <p class="text-[10px] uppercase font-bold text-slate-500">Available: <span class="${bal < 0 ? 'text-red-400' : 'text-'+color+'-400'}">$${bal.toLocaleString()}</span></p>
                                </div>
                            </div>
                            <button onclick="removeCategory(${cat.id})" class="text-slate-700 hover:text-red-500">✕</button>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="flex-1 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                <div class="progress-bar h-full bg-${bal < 0 ? 'red' : color}-500" style="width: ${pct}%"></div>
                            </div>
                            <input type="number" onblur="updateAssigned(${cat.id}, this.value)" value="${currentAssigned || ''}" placeholder="0" class="w-16 bg-transparent text-right text-sm font-bold focus:outline-none border-b border-slate-800 focus:border-${color}-500">
                        </div>
                    </div>
                `;
            }).join('');

            // Templates & Dropdowns
            document.getElementById('templateList').innerHTML = budget.templates.map(t => `
                <button onclick="applyTemplate(${t.id})" class="group bg-slate-800/50 border border-slate-700 px-3 py-2 rounded-xl text-xs font-bold hover:border-${color}-500 flex items-center gap-2">
                    <span class="text-slate-200">${t.name}</span>
                    <span onclick="promptDeleteTemplate(${t.id}, event)" class="opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-500">✕</span>
                </button>
            `).join('');

            ['tCategory', 'tempCategory'].forEach(id => {
                const s = document.getElementById(id);
                const prev = s.value;
                s.innerHTML = '<option value="">Select Category</option>' + budget.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                s.value = prev;
            });

            // Ledger
            let txs = budget.transactions.filter(t => t.date.startsWith(mKey));
            if (state.ledgerFilterCatId) txs = txs.filter(t => t.catId === state.ledgerFilterCatId || (t.isSplit && t.splits.some(s => s.catId === state.ledgerFilterCatId)));
            document.getElementById('ledgerTitle').innerText = `${monthNames[state.selectedMonth-1]} ${state.selectedYear}`;
            document.getElementById('transactionCount').innerText = txs.length;
            
            document.getElementById('ledger').innerHTML = txs.length ? txs.map(t => {
                const isInc = t.type === 'income';
                const cName = isInc ? 'Income' : (budget.categories.find(c => c.id === t.catId)?.name || (t.isSplit ? 'Split Expense' : 'Uncategorized'));
                return `
                    <div class="p-4 border-b border-slate-800/50 split-indicator group" style="color: ${isInc ? '#10b981' : (isPersonal ? '#10b981' : '#6366f1')}">
                        <div class="flex justify-between items-start">
                            <div class="pl-4 flex-1">
                                <div class="flex justify-between text-[9px] uppercase font-black opacity-60 mb-1">
                                    <span>${cName}</span>
                                    <span>${t.date}</span>
                                </div>
                                <h4 class="font-bold text-slate-100">${t.payee || 'Misc'}</h4>
                                ${t.isSplit ? `<div class="mt-2 space-y-1">${t.splits.map(s => `<div class="flex justify-between text-[10px] text-slate-400 font-mono"><span>${budget.categories.find(c => c.id === s.catId)?.name}</span><span>$${s.amount.toLocaleString()}</span></div>`).join('')}</div>` : ''}
                                <p class="text-xs text-slate-500 mt-1 italic">${t.concept || ''}</p>
                            </div>
                            <div class="text-right flex flex-col items-end">
                                <span class="font-mono font-bold ${isInc ? 'text-emerald-400' : 'text-red-400'}">${isInc ? '+' : '-'}$${t.amount.toLocaleString()}</span>
                                <button onclick="deleteTransaction(${t.id})" class="opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-500 text-xs mt-2">✕</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('') : '<div class="p-10 text-center text-slate-600 italic">No history</div>';
        }

        function deleteTransaction(id) { state.budgets[state.activeBudgetId].transactions = state.budgets[state.activeBudgetId].transactions.filter(t => t.id !== id); saveData(); }
        function removeCategory(id) { if(confirm("Remove category? Transactions stay but lose category label.")) { state.budgets[state.activeBudgetId].categories = state.budgets[state.activeBudgetId].categories.filter(c => c.id !== id); saveData(); } }
        function clearData() { if(confirm("Wipe everything?")) { localStorage.clear(); location.reload(); } }
        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.className = "fixed bottom-8 right-8 bg-indigo-600 text-white px-6 py-4 rounded-2xl shadow-2xl transform translate-y-0 opacity-100 transition duration-300 z-[400] font-bold border border-white/10";
            setTimeout(() => t.className = "fixed bottom-8 right-8 bg-indigo-600 text-white px-6 py-4 rounded-2xl shadow-2xl transform translate-y-32 opacity-0 transition duration-300 pointer-events-none z-[400] font-bold border border-white/10", 2000);
        }

        function setTxType(type) {
            state.currentTxType = type;
            const isInc = type === 'income';
            document.getElementById('tabIncome').className = isInc ? 'flex-1 py-3 font-bold text-sm tab-active text-emerald-400 uppercase tracking-widest' : 'flex-1 py-3 font-bold text-sm text-slate-500 uppercase tracking-widest';
            document.getElementById('tabExpense').className = !isInc ? 'flex-1 py-3 font-bold text-sm tab-active text-indigo-400 uppercase tracking-widest' : 'flex-1 py-3 font-bold text-sm text-slate-500 uppercase tracking-widest';
            document.getElementById('categoryArea').style.display = isInc ? 'none' : 'block';
            document.getElementById('btnSubmit').innerText = isInc ? 'Log Income' : 'Log Expense';
            render();
        }

        function initAutocomplete() {
            const input = document.getElementById('tPayee');
            const list = document.getElementById('autocompleteList');
            input.oninput = () => {
                const val = input.value.toLowerCase();
                const payees = [...new Set(state.budgets[state.activeBudgetId].transactions.map(t => t.payee))].filter(p => p && p.toLowerCase().includes(val));
                list.innerHTML = payees.slice(0, 5).map(p => `<div class="p-3 hover:bg-slate-800 cursor-pointer text-sm" onclick="selectPayee('${p.replace(/'/g, "\\'")}')">${p}</div>`).join('');
                list.classList.toggle('hidden', !payees.length || !val);
            };
            input.onblur = () => setTimeout(() => list.classList.add('hidden'), 200);
        }
        window.selectPayee = (p) => { document.getElementById('tPayee').value = p; document.getElementById('autocompleteList').classList.add('hidden'); };

        function initDragAndDrop() {
            const list = document.getElementById('categoryList');
            list.ondragover = (e) => e.preventDefault();
            list.ondrop = (e) => {
                const draggedId = e.dataTransfer.getData('text/plain');
                const budget = state.budgets[state.activeBudgetId];
                const rect = list.getBoundingClientRect();
                const afterElement = [...list.querySelectorAll('.category-card:not(.dragging)')].reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = e.clientY - box.top - box.height / 2;
                    return (offset < 0 && offset > closest.offset) ? { offset, element: child } : closest;
                }, { offset: Number.NEGATIVE_INFINITY }).element;
                const idx = budget.categories.findIndex(c => c.id == draggedId);
                const [cat] = budget.categories.splice(idx, 1);
                if (!afterElement) budget.categories.push(cat);
                else budget.categories.splice(budget.categories.findIndex(c => c.id == afterElement.dataset.id), 0, cat);
                saveData();
            };
            list.ondragstart = (e) => {
                const card = e.target.closest('.category-card');
                card.classList.add('dragging');
                e.dataTransfer.setData('text/plain', card.dataset.id);
            };
            list.ondragend = (e) => e.target.closest('.category-card').classList.remove('dragging');
        }

        function exportToCSV() {
            const b = state.budgets[state.activeBudgetId];
            let csv = "Date,Type,Payee,Concept,Amount,Category\n";
            b.transactions.forEach(t => csv += `${t.date},${t.type},"${t.payee}","${t.concept}",${t.amount},"${b.categories.find(c => c.id === t.catId)?.name || ''}"\n`);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = 'budget_backup.csv'; a.click();
        }

        function importFromCSV(e) {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = (ev) => {
                const rows = ev.target.result.split('\n').slice(1);
                const b = state.budgets[state.activeBudgetId];
                rows.forEach(row => {
                    const c = row.split(',').map(s => s.replace(/"/g, '').trim());
                    if (c.length < 5) return;
                    b.transactions.push({ id: Date.now()+Math.random(), date: c[0], type: c[1], payee: c[2], concept: c[3], amount: parseFloat(c[4]) });
                });
                saveData();
            };
            r.readAsText(f);
        }

        window.onload = loadData;
    </script>
</body>
</html>
