<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Boss Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Space+Mono:wght@400;700&display=swap');
        
        :root {
            --cols: 7;
            --rows: 4;
            --gap: 6px;
            --bg-opacity: 0.05;
            --parallax-x: 0px;
            --parallax-y: 0px;
            --hour-width: 80px;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
        }

        #bg-layer {
            position: fixed;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: translate(var(--parallax-x), var(--parallax-y));
            transition: transform 0.1s ease-out;
            filter: brightness(0.6);
        }

        #viewport {
            display: flex;
            flex-direction: column; /* Vertical Orientation */
            width: 100vw;
            height: 300vh;
            transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
            transform: translateY(-100vh); /* Start on middle page */
        }

        .page {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .edge-sensor {
            position: fixed;
            height: 40px;
            z-index: 1000;
        }
        .sensor-top { 
            top: 0; 
            left: 80%; /* Only the last one fifth of the screen */
            right: 0;
            cursor: n-resize; 
        }
        .sensor-bottom { 
            bottom: 0; 
            left: 0;
            right: 0;
            cursor: s-resize; 
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(var(--cols), 1fr);
            grid-template-rows: repeat(var(--rows), 1fr);
            gap: var(--gap);
            width: 92vw;
            height: 88vh;
            max-width: 1700px;
        }

        .dial {
            background: rgba(255, 255, 255, var(--bg-opacity));
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            overflow: hidden;
        }
        .dial:hover {
            background: rgba(255, 255, 255, calc(var(--bg-opacity) + 0.1));
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .tc-container {
            width: 90vw;
            max-width: 1400px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }
        .timeline-scroll::-webkit-scrollbar { height: 6px; }
        .timeline-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .hour-tile { min-width: var(--hour-width); width: var(--hour-width); transition: all 0.2s ease; }
        .day-night-0 { background-color: rgba(15, 23, 42, 0.4); color: #64748b; } 
        .day-night-1 { background-color: rgba(51, 65, 85, 0.4); color: #f1f5f9; } 
        .day-night-2 { background-color: rgba(30, 41, 59, 0.4); color: #cbd5e1; border-bottom: 2px solid #3b82f6; } 
        .active-hour { background-color: #3b82f6 !important; color: white !important; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); z-index: 10; }
        .city-row-info { background: rgba(15, 23, 42, 0.6); border-right: 1px solid rgba(255, 255, 255, 0.05); }

        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); border-radius: 24px; color: #1e293b; }
        .calc-card { background-color: #334155; border-top: 6px solid #6366f1; }
        .stopwatch-display { font-family: 'Space Mono', monospace; }

        #settings-overlay { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); z-index: 2000; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div class="edge-sensor sensor-top" onmouseenter="navUp()"></div>
    <div class="edge-sensor sensor-bottom" onmouseenter="navDown()"></div>

    <div class="fixed top-6 right-6 flex gap-4 z-[3000]">
        <button id="settings-toggle" class="p-2 bg-white/10 hover:bg-white/20 rounded-full transition-colors backdrop-blur-md border border-white/10">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 1 2-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
    </div>

    <div id="viewport">
        <!-- PAGE 0: WIDGETS (TOP) -->
        <section class="page overflow-y-auto py-20">
            <div class="flex flex-wrap justify-center items-stretch gap-12 w-full max-w-[1400px] px-6">
                <!-- Currency -->
                <div class="flex flex-col gap-6 w-full max-w-[420px]">
                    <div class="glass-card p-8 shadow-2xl">
                        <div id="base-container" class="relative mb-6"></div>
                        <div class="pt-4 border-t border-gray-100">
                            <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 ml-1">Live Rates</h2>
                            <div id="conversion-list" class="flex flex-col gap-3"></div>
                        </div>
                    </div>
                    <div class="bg-black/40 backdrop-blur-md rounded-2xl p-4 flex justify-between items-center text-[10px] font-bold uppercase tracking-widest text-white/50 border border-white/5">
                        <span id="last-update">Syncing...</span>
                        <button id="refresh-rates" class="text-blue-400 hover:text-white transition">Update Rates</button>
                    </div>
                </div>

                <!-- Tools -->
                <div class="flex flex-col gap-8 w-full max-w-[450px]">
                    <div class="calc-card p-6 rounded-3xl shadow-2xl">
                        <h2 class="text-lg font-bold text-indigo-300 mb-4 px-2">&nbsp;</h2>
                        <div class="space-y-4">
                            <div class="flex items-center justify-center space-x-6 text-3xl font-bold">
                                <div class="flex flex-col items-center">
                                    <input type="text" id="inputA" placeholder="A" class="w-24 p-2 rounded-lg text-2xl text-center bg-slate-900 border-2 border-slate-700 text-white auto-select">
                                    <hr class="border-slate-600 w-24 my-2">
                                    <input type="text" id="inputB" placeholder="B" class="w-24 p-2 rounded-lg text-2xl text-center bg-slate-900 border-2 border-slate-700 text-white auto-select">
                                </div>
                                <span class="text-slate-500">=</span>
                                <div class="flex flex-col items-center">
                                    <input type="text" id="inputC" value="1" class="w-24 p-2 rounded-lg text-2xl text-center bg-slate-900 border-2 border-slate-700 text-white auto-select">
                                    <hr class="border-slate-600 w-24 my-2">
                                    <input type="text" id="inputX" value="x" readonly class="w-24 p-2 rounded-lg text-2xl text-center bg-slate-800 border-2 border-slate-700 text-slate-500">
                                </div>
                            </div>
                            <button onclick="solve()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-xl transition shadow-lg">Solve</button>
                            <div id="result" class="text-center"></div>
                        </div>
                    </div>
                    <div class="bg-zinc-900/80 p-8 rounded-3xl shadow-2xl border border-white/10 backdrop-blur-md">
                        <div id="display" class="stopwatch-display text-5xl font-bold text-center text-white/30 mb-8 tabular-nums">00:00:00.00</div>
                        <div class="grid grid-cols-2 gap-4">
                            <button id="mainBtn" onclick="toggleStartReset()" class="py-4 text-white bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-bold transition">Start</button>
                            <button id="freezeBtn" onclick="toggleFreeze()" class="py-4 text-white bg-zinc-700 rounded-2xl font-bold" disabled>Freeze</button>
                        </div>
                    </div>
                </div>

                <!-- Vertical Secret Links (Centered vertically) -->
                <div class="flex flex-col gap-4 justify-center">
                    <a href="https://lyenfish.github.io/asdlfkijyq34oiruywhaskdfjqowiur.html" target="_self" class="dial w-32 h-32"></a>
                    <a href="https://lyenfish.github.io/communitylogin.html" target="_self" class="dial w-32 h-32"></a>
                    <a href="https://lyenfish.github.io/toolhub.html" target="_self" class="dial w-32 h-32"></a>
                </div>
            </div>
            <div class="absolute bottom-10 text-white/20 text-xs font-bold uppercase tracking-[0.2em] w-full text-center">Move mouse to bottom edge to return home</div>
        </section>

        <!-- PAGE 1: SHORTCUTS (CENTER HUB) -->
        <section class="page">
            <main id="grid" class="grid-container"></main>
        </section>

        <!-- PAGE 2: TIME COMPI (BOTTOM) -->
        <section class="page">
            <div class="tc-container flex flex-col h-[85vh]">
                <header class="p-8 flex flex-col md:flex-row justify-between items-center gap-6 border-b border-white/5">
                    <div>
                        <h1 class="text-4xl font-black text-white tracking-tighter">Time Compi</h1>
                        <p class="text-white/40 text-sm font-medium">World Time Coordinator</p>
                    </div>
                    <div class="flex gap-4">
                        <div class="relative">
                            <input type="text" id="citySearch" placeholder="Add city..." class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none w-64 focus:w-80 transition-all text-sm">
                            <div id="searchResults" class="absolute z-50 w-full bg-zinc-900 border border-white/10 rounded-xl shadow-2xl mt-2 hidden max-h-60 overflow-y-auto"></div>
                        </div>
                        <button id="resetTime" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition shadow-lg active:scale-95 text-sm">Now</button>
                    </div>
                </header>
                <div class="flex-grow overflow-hidden flex flex-col">
                    <div class="flex border-b border-white/5 bg-white/5 sticky top-0 z-20">
                        <div class="w-48 md:w-64 flex-shrink-0 p-5 font-bold text-white/30 uppercase tracking-widest text-[10px] border-r border-white/5">Location</div>
                        <div class="flex-grow overflow-x-auto timeline-scroll flex" id="masterTimeline"></div>
                    </div>
                    <div id="cityRows" class="flex-grow overflow-y-auto divide-y divide-white/5"></div>
                </div>
            </div>
            <div class="absolute top-10 text-white/20 text-xs font-bold uppercase tracking-[0.2em] w-full text-center">Move mouse to top edge to return home</div>
        </section>
    </div>

    <div id="settings-overlay" class="fixed inset-0 hidden flex items-center justify-center p-6">
        <div class="bg-zinc-900 border border-white/10 rounded-3xl w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl">
            <div class="p-8 border-b border-white/10 flex justify-between items-center">
                <h2 class="text-2xl font-black text-white">System Config</h2>
                <button id="close-settings" class="text-white/40 hover:text-white">✕</button>
            </div>
            <div class="p-8 overflow-y-auto flex-1 space-y-10">
                <section>
                    <h3 class="text-xs font-bold text-white/30 uppercase tracking-widest mb-6">Environment</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div><label class="text-[10px] text-zinc-500 uppercase block mb-2">Columns</label><input type="number" id="input-cols" class="w-full bg-white text-black p-3 rounded-xl font-bold"></div>
                        <div><label class="text-[10px] text-zinc-500 uppercase block mb-2">Rows</label><input type="number" id="input-rows" class="w-full bg-white text-black p-3 rounded-xl font-bold"></div>
                        <div class="md:col-span-1"><label class="text-[10px] text-zinc-500 uppercase block mb-2">Wallpaper URL</label><input type="text" id="input-bg" class="w-full bg-white text-black p-3 rounded-xl font-bold"></div>
                        
                        <!-- Added Sliders -->
                        <div class="md:col-span-1">
                            <label class="text-[10px] text-zinc-500 uppercase block mb-2">Spacing Gap</label>
                            <input type="range" id="input-gap" min="0" max="40" step="1" class="w-full accent-indigo-500">
                        </div>

                            <label class="text-[10px] text-zinc-500 uppercase block mb-2">Dial Opacity</label>

                <section>
                    <h3 class="text-xs font-bold text-white/30 uppercase tracking-widest mb-6">Shortcuts</h3>
                    <div id="dials-editor-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </section>
            </div>
            <div class="p-8 border-t border-white/10 flex justify-end gap-4">
                <button id="reset-btn" class="px-6 py-3 text-red-400 font-bold">Factory Reset</button>
                <button id="save-btn" class="px-8 py-3 bg-white text-black font-black rounded-xl">Apply Changes</button>
            </div>
        </div>
    </div>

    <script>
        const currencyData = { USD: { name: "US Dollar", flag: "us", symbol: "$" }, MXN: { name: "Mexican Peso", flag: "mx", symbol: "$" }, EUR: { name: "Euro", flag: "eu", symbol: "€" }, HKD: { name: "Hong Kong Dollar", flag: "hk", symbol: "$" }, AED: { name: "UAE Dirham", flag: "ae", symbol: "د.إ" } };
        const linkDefaults = [ "http://web.telegram.org", "http://web.whatsapp.com", "http://www.youtube.com", "https://music.youtube.com/history", "http://photos.google.com", "https://lyenfish.github.io/simplythree.html", "https://lyenfish.github.io/toolhub.html", "https://www.amazon.com.mx", "https://www.amazon.com", "https://www.mercadolibre.com.mx/#from=homecom", "https://lyenfish.github.io/currency.html", "http://super.walmart.com.mx", "https://docs.google.com/spreadsheets/d/1wxb6Ejmx1y0CXaQ-1phyoDQSB0rkJWy4Z8gf-COMVro/edit?gid=858887906#gid=858887906", "https://docs.google.com/spreadsheets/d/1Kj1ZdOwmHlqhgFFccuH8zxUudkz4UvdsgqpgUcWCe7U", "http://teach.italki.com", "https://drive.google.com/drive/u/2/folders/15u0VJJOJzFyorCYSUaBujT7eK_58Pbkb", "https://calendar.google.com/calendar/u/2/r", "https://docs.google.com/document/d/1UCZSqW6UTHBS9Zxd5fEC2pKdFNOdhMRSleBZ65YYzhY/edit?tab=t.0", "https://www.deepl.com/en/translator", "https://translate.google.com/?sl=en&tl=es&op=translate", "https://conjugator.reverso.net/conjugation-spanish.html", "https://cone-echidna-fdrj.squarespace.com/config/scheduling", "https://askjreyes.talentlms.com/plus/dashboard", "https://mail.google.com/mail/u/2/#inbox", "https://docs.google.com/spreadsheets/d/12DDkzrV0UM6GOyVgqeCcNcqqElx74A9e_WdJxxHVH1g/edit?gid=2034361768#gid=2034361768", "http://maps.google.com", "https://notebooklm.google.com/", "http://gemini.google.com" ];
        const initialDials = {}; linkDefaults.forEach((link, i) => { initialDials[i+1] = { label: '', url: link }; });
        const DEFAULTS = { cols: 7, rows: 4, gap: 6, bgOpacity: 5, bg: 'https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?auto=format&fit=crop&q=80&w=2000', calc: { base: "USD", amount: 1.00 }, dials: initialDials };
        let state = JSON.parse(JSON.stringify(DEFAULTS)); let rates = {};

        let navCooldown = false;
        let activePageIndex = 1;

        function navUp() {
            if (navCooldown || activePageIndex === 0) return;
            navigate(activePageIndex - 1);
        }

        function navDown() {
            if (navCooldown || activePageIndex === 2) return;
            navigate(activePageIndex + 1);
        }

        function navigate(pageIndex) {
            if (navCooldown) return;
            document.getElementById('viewport').style.transform = `translateY(-${pageIndex * 100}vh)`;
            activePageIndex = pageIndex;
            navCooldown = true;
            setTimeout(() => { navCooldown = false; }, 800);
        }

        let selectedTime = new Date();
        const allTimezones = Intl.supportedValuesOf('timeZone');
        let tcCities = JSON.parse(localStorage.getItem('time-compi-v1-cities')) || [
            { id: 'local', name: 'Local', zone: Intl.DateTimeFormat().resolvedOptions().timeZone },
            { id: 'ny', name: 'New York', zone: 'America/New_York' },
            { id: 'tky', name: 'Tokyo', zone: 'Asia/Tokyo' }
        ];

        function initTimeCompi() {
            renderTCMasterHeader();
            renderTCRows();
            setupTCDragAndDrop();
            setupTCSearch();
            document.getElementById('resetTime').onclick = () => { selectedTime = new Date(); renderTCRows(); scrollToTCHour(); };
            document.getElementById('masterTimeline').onscroll = (e) => {
                document.querySelectorAll('.city-timeline').forEach(s => s.scrollLeft = e.target.scrollLeft);
            };
            setTimeout(scrollToTCHour, 150);
        }

        function scrollToTCHour() {
            const master = document.getElementById('masterTimeline');
            const target = (selectedTime.getHours() * 80) - (master.offsetWidth / 2) + 40;
            master.scrollTo({ left: target, behavior: 'smooth' });
        }

        function renderTCMasterHeader() {
            const master = document.getElementById('masterTimeline'); master.innerHTML = '';
            for (let i = 0; i < 24; i++) {
                const div = document.createElement('div');
                div.className = 'hour-tile py-4 text-center text-[10px] font-black text-white/20 border-r border-white/5 flex-shrink-0';
                div.innerText = i === 0 ? '12 AM' : (i > 12 ? (i-12)+' PM' : (i === 12 ? '12 PM' : i+' AM'));
                master.appendChild(div);
            }
        }

        function renderTCRows() {
            const container = document.getElementById('cityRows'); container.innerHTML = '';
            const baseZone = tcCities[0]?.zone || 'UTC';
            const fmt = new Intl.DateTimeFormat('en-US', { timeZone: baseZone, year: 'numeric', month: 'numeric', day: 'numeric' });
            const parts = fmt.formatToParts(selectedTime);
            const dMap = {}; parts.forEach(p => dMap[p.type] = p.value);
            const startOfDisplay = new Date(`${dMap.year}-${dMap.month.padStart(2, '0')}-${dMap.day.padStart(2, '0')}T00:00:00`);

            tcCities.forEach(city => {
                const row = document.createElement('div');
                row.className = 'flex group hover:bg-white/5 relative h-20';
                const timeStr = new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: city.zone }).format(selectedTime);
                
                const info = document.createElement('div');
                info.className = 'city-row-info w-48 md:w-64 flex-shrink-0 p-5 flex items-center gap-4 z-10';
                info.innerHTML = `
                    <div class="drag-handle text-white/10 hover:text-blue-400">⠿</div>
                    <div class="flex-grow overflow-hidden">
                        <div class="font-bold text-[12px] truncate text-white/90">${city.name}</div>
                        <div class="text-[9px] text-blue-500 font-bold tabular-nums">${timeStr}</div>
                    </div>
                    <button class="opacity-0 group-hover:opacity-100 text-white/20 hover:text-red-400" onclick="removeTCCity('${city.id}')">✕</button>
                `;

                const timeline = document.createElement('div');
                timeline.className = 'flex-grow overflow-x-hidden flex city-timeline items-center';
                for (let h = 0; h < 24; h++) {
                    const hDate = new Date(startOfDisplay.getTime() + (h * 3600000));
                    const zHour = parseInt(new Intl.DateTimeFormat('en-US', { timeZone: city.zone, hour: 'numeric', hour12: false }).format(hDate));
                    const status = (zHour >= 9 && zHour < 18) ? 1 : (zHour >= 7 && zHour < 21) ? 2 : 0;
                    const isSel = new Intl.DateTimeFormat('en-US', { hour: 'numeric', timeZone: city.zone }).format(selectedTime) === new Intl.DateTimeFormat('en-US', { hour: 'numeric', timeZone: city.zone }).format(hDate);
                    
                    const tile = document.createElement('div');
                    tile.className = `hour-tile h-full flex items-center justify-center text-[10px] font-bold border-r border-white/5 cursor-pointer day-night-${status} ${isSel ? 'active-hour' : ''}`;
                    tile.innerText = zHour === 0 ? '12a' : (zHour > 12 ? (zHour-12)+'p' : (zHour === 12 ? '12p' : zHour+'a'));
                    tile.onclick = () => { selectedTime = new Date(hDate); renderTCRows(); };
                    timeline.appendChild(tile);
                }
                row.appendChild(info); row.appendChild(timeline); container.appendChild(row);
            });
            const scrollX = document.getElementById('masterTimeline').scrollLeft;
            document.querySelectorAll('.city-timeline').forEach(s => s.scrollLeft = scrollX);
        }

        function setupTCDragAndDrop() {
            new Sortable(document.getElementById('cityRows'), {
                animation: 150, handle: '.drag-handle', ghostClass: 'ghost',
                onEnd: (evt) => { tcCities.splice(evt.newIndex, 0, tcCities.splice(evt.oldIndex, 1)[0]); saveTCCities(); renderTCRows(); }
            });
        }

        function setupTCSearch() {
            const s = document.getElementById('citySearch'), r = document.getElementById('searchResults');
            s.oninput = (e) => {
                const val = e.target.value.toLowerCase().trim();
                if(val.length < 2) { r.classList.add('hidden'); return; }
                const matches = allTimezones.filter(z => z.toLowerCase().includes(val)).slice(0, 10);
                r.innerHTML = matches.map(m => `<div class="px-4 py-3 hover:bg-blue-600 cursor-pointer text-xs text-white border-b border-white/5" onclick="addTCCity('${m}')">${m}</div>`).join('');
                r.classList.toggle('hidden', matches.length === 0);
            };
            window.onclick = (e) => { if (!e.target.closest('#citySearch')) r.classList.add('hidden'); };
        }

        window.addTCCity = (zone) => { tcCities.push({ id: Date.now().toString(), name: zone.split('/').pop().replace('_', ' '), zone }); saveTCCities(); renderTCRows(); document.getElementById('citySearch').value = ''; };
        window.removeTCCity = (id) => { tcCities = tcCities.filter(c => c.id !== id); saveTCCities(); renderTCRows(); };
        function saveTCCities() { localStorage.setItem('time-compi-v1-cities', JSON.stringify(tcCities)); }

        async function fetchRates() { 
            document.getElementById('last-update').innerText = "Syncing...";
            try { const res = await fetch("https://open.er-api.com/v6/latest/USD"); const data = await res.json(); rates = data.rates; document.getElementById('last-update').innerText = `Updated: ${new Date().toLocaleTimeString()}`; renderConverter(); } 
            catch (e) { document.getElementById('last-update').innerText = "Update Failed"; } 
        }

        function renderConverter() {
            const base = state.calc.base; const info = currencyData[base];
            document.getElementById('base-container').innerHTML = `<label class="block text-[10px] font-black text-blue-600 uppercase tracking-widest mb-2 ml-1">Base Currency</label><div class="flex items-center border-4 border-blue-50 rounded-2xl p-4 bg-blue-50/50"><img src="https://flagcdn.com/${info.flag}.svg" class="w-8 h-5 object-cover rounded mr-3 shadow-sm"><span class="text-xl font-bold text-blue-500 mr-2">${info.symbol}</span><input type="number" id="base-input" value="${state.calc.amount.toFixed(2)}" class="w-full text-2xl font-black outline-none bg-transparent text-slate-800"></div>`;
            const input = document.getElementById('base-input');
            input.oninput = (e) => { state.calc.amount = parseFloat(e.target.value) || 0; updateList(); };
            input.onfocus = function() { this.select(); };
            const list = document.getElementById('conversion-list'); list.innerHTML = '';
            Object.keys(currencyData).forEach(code => {
                if(code === base) return;
                const c = currencyData[code]; const card = document.createElement('div');
                card.className = "flex items-center justify-between p-3 rounded-xl bg-slate-50 border border-slate-100 cursor-pointer hover:bg-white transition-all"; 
                card.onclick = () => { state.calc.amount = (state.calc.amount / rates[base]) * rates[code]; state.calc.base = code; saveToStorage(); renderConverter(); };
                card.innerHTML = `<div class="flex items-center gap-3"><img src="https://flagcdn.com/${c.flag}.svg" class="w-7 h-4 object-cover rounded shadow-sm"><div><span class="block text-[9px] font-bold text-slate-400 uppercase leading-none">${code}</span><span class="text-xs font-bold text-slate-700">${c.name}</span></div></div><span class="text-md font-black text-blue-600 tabular-nums" id="out-${code}">0.00</span>`;
                list.appendChild(card);
            });
            updateList();
        }
        function updateList() { Object.keys(currencyData).forEach(code => { const el = document.getElementById(`out-${code}`); if(el) el.innerText = ((state.calc.amount / rates[state.calc.base]) * rates[code]).toLocaleString(undefined, {minimumFractionDigits: 2}); }); }

        function solve() {
            const a = parseFloat(document.getElementById('inputA').value), b = parseFloat(document.getElementById('inputB').value), c = parseFloat(document.getElementById('inputC').value), resDiv = document.getElementById('result');
            if(isNaN(a) || isNaN(b) || isNaN(c) || a === 0) { resDiv.innerHTML = `<p class="text-rose-400 text-xs">Invalid inputs</p>`; return; }
            resDiv.innerHTML = `<p class="text-2xl font-black text-indigo-400">x = ${((b * c) / a).toLocaleString()}</p>`;
        }

        let timerInt = null, tStart = 0, tElapsed = 0, tRunning = false, tFrozen = false, tFZVal = 0;
        function formatStopwatch(ms) {
            const cs = Math.floor((ms % 1000) / 10), s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
            return [h,m,s%60].map(v => String(v).padStart(2, '0')).join(':') + '.' + String(cs).padStart(2, '0');
        }
        function toggleStartReset() {
            const display = document.getElementById('display'), btn = document.getElementById('mainBtn'), fz = document.getElementById('freezeBtn');
            if (tRunning) { clearInterval(timerInt); tRunning = false; tElapsed = 0; display.textContent = formatStopwatch(0); display.classList.replace('text-white', 'text-white/30'); btn.textContent = 'Start'; btn.classList.replace('bg-red-600', 'bg-emerald-600'); fz.disabled = true; fz.textContent = 'Freeze'; } 
            else { tStart = Date.now() - tElapsed; timerInt = setInterval(() => { tElapsed = Date.now() - tStart; display.textContent = formatStopwatch(tFrozen ? tFZVal : tElapsed); }, 10); tRunning = true; display.classList.replace('text-white/30', 'text-white'); btn.textContent = 'Reset'; btn.classList.replace('bg-emerald-600', 'bg-red-600'); fz.disabled = false; }
        }
        function toggleFreeze() { tFrozen = !tFrozen; if(tFrozen) tFZVal = tElapsed; document.getElementById('freezeBtn').textContent = tFrozen ? 'Live' : 'Freeze'; }

        function load() { 
            const saved = localStorage.getItem('megaBossHubState_v4'); 
            if(saved) state = {...DEFAULTS, ...JSON.parse(saved)}; 
            updateStyles(); renderGrid(); fetchRates(); initTimeCompi(); 
        }
        function saveToStorage() { localStorage.setItem('megaBossHubState_v4', JSON.stringify(state)); }
        function updateStyles() { document.documentElement.style.setProperty('--cols', state.cols); document.documentElement.style.setProperty('--rows', state.rows); document.documentElement.style.setProperty('--gap', `${state.gap}px`); document.documentElement.style.setProperty('--bg-opacity', state.bgOpacity / 100); document.getElementById('bg-layer').style.backgroundImage = `url('${state.bg}')`; }
        
        function renderGrid() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            for (let i = 1; i <= state.cols * state.rows; i++) {
                const d = state.dials[i] || { url: '', label: '' };
                const a = document.createElement('a'); a.className = 'dial'; a.href = d.url || '#'; a.dataset.pos = i;
                a.target = '_self';
                grid.appendChild(a);
            }
        }

        window.onmousemove = (e) => { 
            const x = (e.clientX / window.innerWidth - 0.5) * -20, y = (e.clientY / window.innerHeight - 0.5) * -20; 
            document.documentElement.style.setProperty('--parallax-x', `${x}px`); document.documentElement.style.setProperty('--parallax-y', `${y}px`); 
        };
        document.getElementById('settings-toggle').onclick = () => {
            const list = document.getElementById('dials-editor-list'); list.innerHTML = '';
            document.getElementById('input-cols').value = state.cols; 
            document.getElementById('input-rows').value = state.rows; 
            document.getElementById('input-bg').value = state.bg;
            document.getElementById('input-gap').value = state.gap;
            document.getElementById('input-opacity').value = state.bgOpacity;

            for (let i = 1; i <= state.cols * state.rows; i++) {
                const d = state.dials[i] || { label: '', url: '' };
                list.innerHTML += `<div class="bg-white/5 p-4 rounded-xl border border-white/5 space-y-3">
                    <div class="flex justify-between items-center"><span class="text-[10px] font-black text-white/20">#${i}</span></div>
                    <input type="text" class="w-full bg-white text-black p-2 rounded-lg text-xs font-bold" data-pos="${i}" data-key="label" placeholder="Label" value="${d.label}">
                    <input type="text" class="text-black bg-white w-full p-2 rounded-lg text-xs font-bold" data-pos="${i}" data-key="url" placeholder="URL" value="${d.url}">
                </div>`;
            }
            document.getElementById('settings-overlay').classList.remove('hidden');
        };
        document.getElementById('save-btn').onclick = () => {
            state.cols = parseInt(document.getElementById('input-cols').value);
            state.rows = parseInt(document.getElementById('input-rows').value);
            state.bg = document.getElementById('input-bg').value;
            state.gap = parseInt(document.getElementById('input-gap').value);
            state.bgOpacity = parseInt(document.getElementById('input-opacity').value);

            document.querySelectorAll('#dials-editor-list input').forEach(inp => {
                const p = inp.dataset.pos, k = inp.dataset.key; if(!state.dials[p]) state.dials[p] = {}; state.dials[p][k] = inp.value;
            });
            saveToStorage(); updateStyles(); renderGrid(); document.getElementById('settings-overlay').classList.add('hidden');
        };
        document.getElementById('close-settings').onclick = () => document.getElementById('settings-overlay').classList.add('hidden');
        document.getElementById('refresh-rates').onclick = fetchRates;
        document.getElementById('reset-btn').onclick = () => { if(confirm('Factory Reset?')) { localStorage.clear(); location.reload(); } };
        load();
    </script>
</body>
</html>
