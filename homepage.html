<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Boss Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Space+Mono:wght@400;700&display=swap');
        
        :root {
            --cols: 7;
            --rows: 4;
            --gap: 6px;
            --bg-opacity: 0.05;
            --parallax-x: 0px;
            --parallax-y: 0px;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
        }

        #bg-layer {
            position: fixed;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: translate(var(--parallax-x), var(--parallax-y));
            transition: transform 0.1s ease-out;
            filter: brightness(0.7);
        }

        #viewport {
            display: flex;
            width: 200vw;
            height: 100vh;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
        }

        .page {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .edge-sensor {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 30px;
            z-index: 1000;
        }
        .edge-right { right: 0; cursor: e-resize; }
        .edge-left { left: 0; cursor: w-resize; }

        /* Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(var(--cols), 1fr);
            grid-template-rows: repeat(var(--rows), 1fr);
            gap: var(--gap);
            width: 90vw;
            height: 85vh;
            max-width: 1600px;
        }

        .dial {
            background: rgba(255, 255, 255, var(--bg-opacity));
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            backdrop-filter: blur(8px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }
        .dial:active { cursor: grabbing; }
        .dial.dragging { opacity: 0.5; transform: scale(0.95); }
        .dial.drag-over { border-color: rgba(255, 255, 255, 0.8); background: rgba(255, 255, 255, 0.2); }
        .dial:hover {
            background: rgba(255, 255, 255, calc(var(--bg-opacity) + 0.07));
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Widgets Page Styling */
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.6);
            color: #1e293b;
        }

        .currency-card {
            transition: all 0.2s ease;
            cursor: pointer;
            background: #f8fafc;
            border: 2px solid #f1f5f9;
        }
        .currency-card:hover {
            transform: translateY(-2px);
            background-color: white;
            border-color: #3b82f6;
        }

        /* Calculator Styles */
        .calc-card { background-color: #334155; border-top: 6px solid #6366f1; min-height: auto; }
        .calc-input {
            background-color: #1e293b;
            color: #f8fafc;
            text-align: center;
            border: 2px solid #475569;
            transition: all 0.2s;
        }
        .calc-input:focus { border-color: #818cf8; outline: none; background-color: #0f172a; box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2); }
        .calc-input[readonly] { background-color: #0f172a; cursor: not-allowed; border-color: #334155; color: #64748b; }
        hr.divider { border: 0; height: 2px; background: #475569; margin: 4px 0; }

        /* Timer Styles */
        .stopwatch-display {
            font-family: 'Space Mono', monospace;
            letter-spacing: -1px;
            text-shadow: 0 0 10px rgba(79, 70, 229, 0.4);
            transition: color 0.3s;
        }
        .btn { font-weight: 600; transition: all 0.2s ease-in-out; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3); }

        #settings-overlay { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); z-index: 2000; }
        .settings-input { width: 100%; background: #ffffff; color: #000000; padding: 0.5rem; border-radius: 0.375rem; outline: none; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div class="edge-sensor edge-right" onmouseenter="setPage(1)"></div>
    <div class="edge-sensor edge-left" onmouseenter="setPage(0)"></div>

    <div class="fixed top-6 right-6 flex gap-4 z-[3000]">
        <button id="settings-toggle" class="p-2 bg-white/10 hover:bg-white/20 rounded-full transition-colors backdrop-blur-md border border-white/10">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
    </div>

    <div id="viewport">
        <!-- PAGE 1: SHORTCUTS -->
        <section class="page">
            <main id="grid" class="grid-container"></main>
        </section>

        <!-- PAGE 2: WIDGETS -->
        <section class="page overflow-y-auto py-10">
            <div class="flex flex-wrap justify-center items-stretch gap-8 px-10 w-full max-w-[1400px]">
                
                <!-- Left Column: Currency -->
                <div class="flex flex-col gap-6 w-full max-w-[450px]">
                    <div class="glass-card p-8">
                        <div id="base-container" class="relative mb-6"></div>
                        <div class="pt-4 border-t border-gray-100">
                            <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4 ml-1">Live Rates</h2>
                            <div id="conversion-list" class="grid grid-cols-1 gap-3"></div>
                        </div>
                    </div>
                    <div class="bg-black/40 backdrop-blur-md rounded-2xl p-4 flex justify-between items-center text-[10px] font-bold uppercase tracking-widest text-white/70">
                        <span id="last-update">Syncing...</span>
                        <button id="refresh-rates" class="text-blue-400 hover:text-white">Update</button>
                    </div>
                </div>

                <!-- Right Column: Tools & Large Secret Links -->
                <div class="flex gap-8 w-full max-w-[700px]">
                    <!-- Main Tools Column -->
                    <div class="flex flex-col gap-8 flex-1">
                        <!-- Calculator -->
                        <div class="calc-card p-6 rounded-3xl shadow-xl">
                            <h2 contenteditable="true" class="text-lg font-bold text-indigo-300 mb-4 px-2">&nbsp;</h2>
                            <div class="space-y-4">
                                <div class="flex items-center justify-center space-x-6 text-3xl font-bold">
                                    <div class="flex flex-col items-center">
                                        <input type="text" id="inputA" placeholder="A" class="calc-input w-24 p-2 rounded-lg text-2xl auto-select">
                                        <hr class="divider w-24">
                                        <input type="text" id="inputB" placeholder="B" class="calc-input w-24 p-2 rounded-lg text-2xl auto-select">
                                    </div>
                                    <span class="text-slate-500">=</span>
                                    <div class="flex flex-col items-center">
                                        <input type="text" id="inputC" value="1" class="calc-input w-24 p-2 rounded-lg text-2xl auto-select">
                                        <hr class="divider w-24">
                                        <input type="text" id="inputX" value="x" readonly class="calc-input w-24 p-2 rounded-lg text-2xl">
                                    </div>
                                </div>
                                <button onclick="solve()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-xl transition shadow-lg">Solve</button>
                                <div id="result" class="text-center"></div>
                            </div>
                        </div>

                        <!-- Timer -->
                        <div class="bg-gray-800 p-8 rounded-3xl shadow-xl border border-gray-700">
                            <header class="text-center mb-6">
                                <h1 class="text-xl font-extrabold text-white">Precision Timer</h1>
                                <p class="text-gray-400 text-[10px] uppercase tracking-widest">HH:MM:SS.ss</p>
                            </header>
                            <div class="text-center mb-8">
                                <div id="display" class="stopwatch-display text-5xl font-bold text-gray-400">00:00:00.00</div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <button id="mainBtn" onclick="toggleStartReset()" class="btn py-3 text-white bg-green-600 hover:bg-green-700 rounded-xl">Start</button>
                                <button id="freezeBtn" onclick="toggleFreeze()" class="btn py-3 text-white bg-gray-600 rounded-xl" disabled>Freeze</button>
                            </div>
                        </div>
                    </div>

                    <!-- Vertical Large Secret Link Column (Centered Vertically) -->
                    <div class="flex flex-col gap-4 justify-center">
                        <a href="https://lyenfish.github.io/asdlfkijyq34oiruywhaskdfjqowiur.html" target="_self" class="dial w-32 h-32"></a>
                        <a href="https://lyenfish.github.io/communitylogin.html" target="_self" class="dial w-32 h-32"></a>
                        <a href="https://lyenfish.github.io/toolhub.html" target="_self" class="dial w-32 h-32"></a>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Settings -->
    <div id="settings-overlay" class="fixed inset-0 hidden flex items-center justify-center p-6">
        <div class="bg-zinc-900 border border-white/10 rounded-2xl w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h2 class="text-xl font-bold tracking-tight text-white">Configuration Hub</h2>
                <button id="close-settings" class="text-zinc-400 hover:text-white">✕</button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 space-y-8">
                <section>
                    <h3 class="text-sm font-semibold text-zinc-500 uppercase mb-4">Layout & Style</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="flex flex-col gap-2"><label class="text-xs text-zinc-400">Grid Columns</label><input type="number" id="input-cols" class="settings-input"></div>
                        <div class="flex flex-col gap-2"><label class="text-xs text-zinc-400">Grid Rows</label><input type="number" id="input-rows" class="settings-input"></div>
                        <div class="flex flex-col gap-2"><label class="text-xs text-zinc-400">Wallpaper URL</label><input type="text" id="input-bg" class="settings-input"></div>
                        <div class="flex flex-col gap-2"><label class="text-xs text-zinc-400">Gap</label><input type="range" id="input-gap" min="0" max="50"></div>
                        <div class="flex flex-col gap-2"><label class="text-xs text-zinc-400">Opacity</label><input type="range" id="input-opacity" min="0" max="100"></div>
                    </div>
                </section>
                <section>
                    <h3 class="text-sm font-semibold text-zinc-500 uppercase mb-4">Dials</h3>
                    <div id="dials-editor-list" class="space-y-4"></div>
                </section>
            </div>
            <div class="p-6 border-t border-white/10 flex justify-end gap-3">
                <button id="reset-btn" class="px-4 py-2 text-xs text-red-400 rounded-lg">Reset</button>
                <button id="save-btn" class="px-6 py-2 bg-white text-black font-bold text-xs rounded-lg">Apply</button>
            </div>
        </div>
    </div>

    <script>
        const currencyData = { USD: { name: "US Dollar", flag: "us", symbol: "$" }, MXN: { name: "Mexican Peso", flag: "mx", symbol: "$" }, EUR: { name: "Euro", flag: "eu", symbol: "€" }, HKD: { name: "Hong Kong Dollar", flag: "hk", symbol: "$" }, AED: { name: "UAE Dirham", flag: "ae", symbol: "د.إ" } };
        const linkDefaults = [ "http://web.telegram.org", "http://web.whatsapp.com", "http://www.youtube.com", "https://music.youtube.com/history", "http://photos.google.com", "https://lyenfish.github.io/simplythree.html", "https://lyenfish.github.io/toolhub.html", "https://www.amazon.com.mx", "https://www.amazon.com", "https://www.mercadolibre.com.mx/#from=homecom", "https://lyenfish.github.io/currency.html", "http://super.walmart.com.mx", "https://docs.google.com/spreadsheets/d/1wxb6Ejmx1y0CXaQ-1phyoDQSB0rkJWy4Z8gf-COMVro/edit?gid=858887906#gid=858887906", "https://docs.google.com/spreadsheets/d/1Kj1ZdOwmHlqhgFFccuH8zxUudkz4UvdsgqpgUcWCe7U", "http://teach.italki.com", "https://drive.google.com/drive/u/2/folders/15u0VJJOJzFyorCYSUaBujT7eK_58Pbkb", "https://calendar.google.com/calendar/u/2/r", "https://docs.google.com/document/d/1UCZSqW6UTHBS9Zxd5fEC2pKdFNOdhMRSleBZ65YYzhY/edit?tab=t.0", "https://www.deepl.com/en/translator", "https://translate.google.com/?sl=en&tl=es&op=translate", "https://conjugator.reverso.net/conjugation-spanish.html", "https://cone-echidna-fdrj.squarespace.com/config/scheduling", "https://askjreyes.talentlms.com/plus/dashboard", "https://mail.google.com/mail/u/2/#inbox", "https://docs.google.com/spreadsheets/d/12DDkzrV0UM6GOyVgqeCcNcqqElx74A9e_WdJxxHVH1g/edit?gid=2034361768#gid=2034361768", "http://maps.google.com", "https://notebooklm.google.com/", "http://gemini.google.com" ];
        const initialDials = {}; linkDefaults.forEach((link, i) => { const host = new URL(link).hostname.replace('www.','').split('.')[0]; initialDials[i+1] = { label: host.charAt(0).toUpperCase() + host.slice(1), url: link, icon: '' }; });
        const DEFAULTS = { cols: 7, rows: 4, gap: 6, bgOpacity: 5, bg: 'https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?auto=format&fit=crop&q=80&w=2000', calc: { base: "USD", amount: 1.00 }, dials: initialDials };
        let state = JSON.parse(JSON.stringify(DEFAULTS)); let rates = {};

        function setPage(i) { document.getElementById('viewport').style.transform = `translateX(-${i * 100}vw)`; }

        // Currency
        async function fetchRates() { 
            document.getElementById('last-update').innerText = "Syncing...";
            try { const res = await fetch("https://open.er-api.com/v6/latest/USD"); const data = await res.json(); rates = data.rates; document.getElementById('last-update').innerText = `Sync: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`; renderConverter(); } 
            catch (e) { document.getElementById('last-update').innerText = "Offline"; } 
        }
        function setBaseCurrency(code) { state.calc.amount = (state.calc.amount / rates[state.calc.base]) * rates[code]; state.calc.base = code; saveToStorage(); renderConverter(); const input = document.getElementById('base-input'); if(input) { input.focus(); input.select(); } }
        function renderConverter() {
            const base = state.calc.base; const info = currencyData[base];
            document.getElementById('base-container').innerHTML = `<label class="block text-xs font-black text-blue-600 uppercase tracking-widest mb-2 ml-1">Base (${base})</label><div class="flex items-center border-4 border-blue-50 rounded-2xl p-5 bg-blue-50/20 focus-within:border-blue-400 transition-all"><img src="https://flagcdn.com/${info.flag}.svg" class="w-10 h-6 object-cover rounded mr-4 shadow-sm"><span class="text-2xl font-bold text-blue-500 mr-2">${info.symbol}</span><input type="number" id="base-input" value="${state.calc.amount.toFixed(2)}" class="w-full text-3xl font-black outline-none bg-transparent text-slate-800"></div>`;
            const input = document.getElementById('base-input');
            input.oninput = (e) => { state.calc.amount = parseFloat(e.target.value) || 0; updateListValues(); };
            input.onfocus = function() { this.select(); };
            const list = document.getElementById('conversion-list'); list.innerHTML = '';
            Object.keys(currencyData).forEach(code => {
                if(code === base) return;
                const cInfo = currencyData[code]; const card = document.createElement('div');
                card.className = "currency-card flex items-center justify-between p-4 rounded-xl"; card.onclick = () => setBaseCurrency(code);
                card.innerHTML = `<div class="flex items-center gap-4"><img src="https://flagcdn.com/${cInfo.flag}.svg" class="w-9 h-5 object-cover rounded shadow-sm"><div><span class="block text-[10px] font-bold text-slate-400 uppercase leading-none">${code}</span><span class="text-sm font-bold text-slate-700">${cInfo.name}</span></div></div><div class="text-right"><span class="text-lg font-black text-blue-600" id="output-${code}">0.00</span></div>`;
                list.appendChild(card);
            });
            updateListValues();
        }
        function updateListValues() { if(!rates[state.calc.base]) return; Object.keys(currencyData).forEach(code => { const output = document.getElementById(`output-${code}`); if(output) { const val = (state.calc.amount / rates[state.calc.base]) * rates[code]; output.innerText = val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }}); }

        // Solver
        function solve() {
            const a = parseFloat(document.getElementById('inputA').value), b = parseFloat(document.getElementById('inputB').value), c = parseFloat(document.getElementById('inputC').value), resDiv = document.getElementById('result');
            if(isNaN(a) || isNaN(b) || isNaN(c)) { resDiv.innerHTML = `<p class="text-rose-400 text-sm py-1">Enter valid numbers</p>`; return; }
            if(a === 0) { resDiv.innerHTML = `<p class="text-rose-400 text-sm py-1">A cannot be zero</p>`; return; }
            const sol = (b * c) / a; resDiv.innerHTML = `<p class="text-2xl font-extrabold text-indigo-400 py-1">x = ${sol.toLocaleString(undefined, { maximumFractionDigits: 4 })}</p>`;
        }

        // Timer
        let timerInterval = null, startTime = 0, elapsedTime = 0, isRunning = false, isFrozen = false, frozenTime = 0;
        const displayEl = document.getElementById('display'), mainBtn = document.getElementById('mainBtn'), freezeBtn = document.getElementById('freezeBtn');
        function formatTime(ms) {
            const cs = Math.floor((ms % 1000) / 10), ts = Math.floor(ms / 1000), h = Math.floor(ts / 3600), m = Math.floor((ts % 3600) / 60), s = ts % 60;
            return [h,m,s].map(v => String(v).padStart(2, '0')).join(':') + '.' + String(cs).padStart(2, '0');
        }
        function updateUI() { if(isRunning) elapsedTime = Date.now() - startTime; displayEl.textContent = formatTime(isFrozen ? frozenTime : elapsedTime); }
        function toggleStartReset() {
            if (isRunning) { clearInterval(timerInterval); isRunning = false; isFrozen = false; elapsedTime = 0; displayEl.textContent = formatTime(0); displayEl.classList.replace('text-indigo-400', 'text-gray-400'); mainBtn.textContent = 'Start'; mainBtn.className = 'btn py-3 text-white bg-green-600 hover:bg-green-700 rounded-xl'; freezeBtn.textContent = 'Freeze'; freezeBtn.className = 'btn py-3 text-white bg-gray-600 rounded-xl'; freezeBtn.disabled = true; } 
            else { startTime = Date.now() - elapsedTime; timerInterval = setInterval(updateUI, 10); isRunning = true; displayEl.classList.replace('text-gray-400', 'text-indigo-400'); mainBtn.textContent = 'Reset'; mainBtn.className = 'btn py-3 text-white bg-red-600 hover:bg-red-700 rounded-xl'; freezeBtn.disabled = false; freezeBtn.className = 'btn py-3 text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl'; }
        }
        function toggleFreeze() { if(!isRunning) return; if(isFrozen) { isFrozen = false; freezeBtn.textContent = 'Freeze'; freezeBtn.classList.replace('bg-amber-600', 'bg-indigo-600'); } else { frozenTime = elapsedTime; isFrozen = true; freezeBtn.textContent = 'Live'; freezeBtn.classList.replace('bg-indigo-600', 'bg-amber-600'); } updateUI(); }

        // Storage & Grid
        function loadState() { const saved = localStorage.getItem('megaBossHubState_v3'); if(saved) state = {...DEFAULTS, ...JSON.parse(saved)}; updateStyles(); renderGrid(); fetchRates(); }
        function saveToStorage() { localStorage.setItem('megaBossHubState_v3', JSON.stringify(state)); }
        function updateStyles() { document.documentElement.style.setProperty('--cols', state.cols); document.documentElement.style.setProperty('--rows', state.rows); document.documentElement.style.setProperty('--gap', `${state.gap}px`); document.documentElement.style.setProperty('--bg-opacity', state.bgOpacity / 100); document.getElementById('bg-layer').style.backgroundImage = `url('${state.bg}')`; }
        function renderGrid() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            for (let i = 1; i <= state.cols * state.rows; i++) {
                const d = state.dials[i] || { url: '', label: '' };
                const a = document.createElement('a'); a.className = 'dial'; a.href = d.url || '#'; a.target = '_self'; a.dataset.pos = i; a.draggable = true;
                a.ondragstart = (e) => { e.dataTransfer.setData('text', i); a.classList.add('dragging'); };
                a.ondrop = (e) => { e.preventDefault(); const from = e.dataTransfer.getData('text'), temp = state.dials[from]; state.dials[from] = state.dials[i]; state.dials[i] = temp; saveToStorage(); renderGrid(); };
                a.ondragover = (e) => e.preventDefault();
                grid.appendChild(a);
            }
        }

        // Global Listeners
        document.querySelectorAll('.auto-select').forEach(input => { input.addEventListener('focus', function() { setTimeout(() => this.select(), 0); }); input.addEventListener('keydown', (e) => { if(e.key === 'Enter') { solve(); e.target.blur(); }}); });
        window.onmousemove = (e) => { const x = (e.clientX / window.innerWidth - 0.5) * -30, y = (e.clientY / window.innerHeight - 0.5) * -30; document.documentElement.style.setProperty('--parallax-x', `${x}px`); document.documentElement.style.setProperty('--parallax-y', `${y}px`); };
        document.getElementById('settings-toggle').onclick = () => { document.getElementById('input-cols').value = state.cols; document.getElementById('input-rows').value = state.rows; document.getElementById('input-bg').value = state.bg; document.getElementById('input-gap').value = state.gap; document.getElementById('input-opacity').value = state.bgOpacity; const list = document.getElementById('dials-editor-list'); list.innerHTML = ''; for (let i = 1; i <= state.cols * state.rows; i++) { const d = state.dials[i] || { label: '', url: '' }; list.innerHTML += `<div class="bg-white/5 p-4 rounded-xl flex gap-4 items-end border border-white/5"><div class="flex-1"><label class="text-[10px] uppercase text-zinc-400">Label</label><input type="text" class="w-full bg-white text-black p-1 rounded" data-pos="${i}" data-key="label" value="${d.label}"></div><div class="flex-1"><label class="text-[10px] uppercase text-zinc-400">URL</label><input type="text" class="w-full bg-white text-black p-1 rounded" data-pos="${i}" data-key="url" value="${d.url}"></div></div>`; } document.getElementById('settings-overlay').classList.remove('hidden'); };
        document.getElementById('save-btn').onclick = () => { state.cols = parseInt(document.getElementById('input-cols').value); state.rows = parseInt(document.getElementById('input-rows').value); state.bg = document.getElementById('input-bg').value; state.gap = parseInt(document.getElementById('input-gap').value); state.bgOpacity = parseInt(document.getElementById('input-opacity').value); document.querySelectorAll('#dials-editor-list input').forEach(input => { const pos = input.dataset.pos, key = input.dataset.key; if(!state.dials[pos]) state.dials[pos] = {}; state.dials[pos][key] = input.value; }); saveToStorage(); updateStyles(); renderGrid(); document.getElementById('settings-overlay').classList.add('hidden'); };
        document.getElementById('close-settings').onclick = () => document.getElementById('settings-overlay').classList.add('hidden');
        document.getElementById('refresh-rates').onclick = fetchRates;
        document.getElementById('reset-btn').onclick = () => { if(confirm('Reset?')) { localStorage.removeItem('megaBossHubState_v3'); location.reload(); } };
        loadState();
    </script>
</body>
</html>
